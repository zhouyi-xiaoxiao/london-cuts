<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>London Cuts V3 — Studio & Public</title>

  <!-- React 18.3.1 + Babel 7.29.0 -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=Bodoni+Moda:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- MapLibre GL -->
  <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>

  <!-- Base styles -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/v2.css">

  <style>
    /* Global setup */
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      color: #1a1a1a;
    }
    #root {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    body[data-mode="fashion"] {
      --mode-display-font: 'Instrument Serif', serif;
      --mode-body-font: 'Archivo', sans-serif;
    }
    body[data-mode="cinema"] {
      --mode-display-font: 'Bodoni Moda', serif;
      --mode-body-font: 'JetBrains Mono', monospace;
    }
    body[data-mode="punk"] {
      --mode-display-font: 'Caveat', cursive;
      --mode-body-font: 'Archivo Black', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    OpenAI API Key bootstrap.

    Local dev: copy local-config.example.js → local-config.js and paste your key.
               local-config.js is gitignored and MUST NOT ship in any public build.

    Deployed showcase (Phase A): local-config.js is absent → __LC_OPENAI_KEY_DEFAULT
    stays empty → the app runs in demo mode. Pre-generated postcard variants load
    from app/generated-images/manifest.json via snapshot.jsx. The KeyPasteModal
    lets a visitor paste their own key into sessionStorage if they want to try
    live generation; nothing is ever written to localStorage or sent off-domain.

    Phase B (proxy backend): this block will be removed entirely. Auth switches
    to an invite code held in sessionStorage; calls go to /api/media/* instead
    of api.openai.com.
  -->
  <script src="local-config.js" onerror="this.remove()"></script>
  <script>
    if (!window.__LC_OPENAI_KEY_DEFAULT) { window.__LC_OPENAI_KEY_DEFAULT = ''; }
  </script>

  <!-- EXIF + PDF libs for the vision pipeline -->
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

  <!-- Component order: data → shared → store → workspace → publish → postcard-editor → public-atlas → public-project → projects-list → app -->
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/palette.jsx"></script>
  <script type="text/babel" src="src/store.jsx"></script>
  <script type="text/babel" src="src/snapshot.jsx"></script>
  <script type="text/babel" src="src/workspace.jsx"></script>
  <script type="text/babel" src="src/publish.jsx"></script>
  <script type="text/babel" src="src/postcard-editor.jsx"></script>
  <script type="text/babel" src="src/public-atlas.jsx"></script>
  <script type="text/babel" src="src/public-project.jsx"></script>
  <script type="text/babel" src="src/projects-list.jsx"></script>
  <script type="text/babel" src="src/seed-demo.jsx"></script>
  <script type="text/babel" src="src/vision-pipeline.jsx"></script>
  <script type="text/babel" src="src/hackathon-demo.jsx"></script>
  <script type="text/babel" src="src/prestyle.jsx"></script>
  <script type="text/babel" src="src/demo-tour.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>

  <!-- Render app -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
