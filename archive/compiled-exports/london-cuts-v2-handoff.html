<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>London Cuts — V2 Handoff</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=Bodoni+Moda:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;700&display=swap" />
<style data-src="styles/base.css">
/* London Cuts — base styles, design tokens, mode grammars */

:root {
  /* Neutrals — warm paper */
  --paper: oklch(0.985 0.004 60);
  --paper-2: oklch(0.96 0.005 60);
  --paper-3: oklch(0.92 0.006 60);
  --ink: oklch(0.14 0.008 60);
  --ink-2: oklch(0.32 0.008 60);
  --ink-3: oklch(0.55 0.008 60);
  --rule: oklch(0.88 0.006 60);

  /* Accent (mode-agnostic) */
  --accent: oklch(0.55 0.14 20);

  /* Type scale */
  --f-display: 'Archivo Black', 'Archivo', system-ui, sans-serif;
  --f-serif: 'Instrument Serif', 'Times New Roman', serif;
  --f-fashion: 'Bodoni Moda', 'Didot', 'Bodoni 72', serif;
  --f-sans: 'Archivo', system-ui, -apple-system, sans-serif;
  --f-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --f-hand: 'Caveat', cursive;

  /* Grid */
  --gutter: 24px;
  --edge: 40px;

  /* Mode tokens — overridden per mode */
  --mode-bg: var(--paper);
  --mode-ink: var(--ink);
  --mode-accent: var(--accent);
  --mode-display-font: var(--f-serif);
  --mode-body-font: var(--f-sans);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
input, textarea, select { font: inherit; color: inherit; background: none; border: none; outline: none; }

/* ———————————————————————————————————————————
   MODE GRAMMARS — change typography, rhythm, spacing
——————————————————————————————————————————— */

/* PUNK — zine, collage, raw, asymmetric, black on white with red */
[data-mode="punk"] {
  --mode-bg: oklch(0.97 0 0);
  --mode-ink: oklch(0.08 0 0);
  --mode-accent: oklch(0.62 0.24 25);
  --mode-display-font: var(--f-display);
  --mode-body-font: var(--f-sans);
}

/* FASHION — editorial, whitespace, bold crop, elegant serif */
[data-mode="fashion"] {
  --mode-bg: oklch(0.98 0.008 75);
  --mode-ink: oklch(0.16 0.01 40);
  --mode-accent: oklch(0.45 0.12 25);
  --mode-display-font: var(--f-fashion);
  --mode-body-font: var(--f-sans);
}

/* CINEMA — scene card, subtitle, moody, dark */
[data-mode="cinema"] {
  --mode-bg: oklch(0.12 0.015 250);
  --mode-ink: oklch(0.92 0.01 80);
  --mode-accent: oklch(0.88 0.14 90);
  --mode-display-font: var(--f-serif);
  --mode-body-font: var(--f-mono);
}

/* ———————————————————————————————————————————
   PRIMITIVES
——————————————————————————————————————————— */

.page { min-height: 100vh; background: var(--mode-bg, var(--paper)); color: var(--mode-ink, var(--ink)); transition: background 400ms ease, color 400ms ease; }

.rule { height: 1px; background: currentColor; opacity: 0.15; }
.rule-heavy { height: 2px; background: currentColor; }

.mono { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
.mono-sm { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

.eyebrow { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7; }

/* Image placeholders — striped, with mono caption */
.img-ph {
  position: relative;
  background: repeating-linear-gradient(
    135deg,
    oklch(0.88 0.01 60) 0 10px,
    oklch(0.92 0.008 60) 10px 20px
  );
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  color: oklch(0.35 0.01 60);
}
.img-ph::before {
  content: attr(data-label);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 12px;
  background: oklch(0.98 0.004 60 / 0.9);
  margin: 10px;
  border-radius: 2px;
}
.img-ph[data-tone="dark"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.2 0.01 250) 0 10px,
    oklch(0.24 0.01 250) 10px 20px
  );
  color: oklch(0.7 0.01 60);
}
.img-ph[data-tone="dark"]::before {
  background: oklch(0.15 0.01 250 / 0.9);
  color: oklch(0.85 0.01 60);
}
.img-ph[data-tone="warm"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.82 0.04 50) 0 10px,
    oklch(0.86 0.03 55) 10px 20px
  );
}
.img-ph[data-tone="cool"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.78 0.04 240) 0 10px,
    oklch(0.82 0.03 235) 10px 20px
  );
}
.img-ph[data-tone="punk"] {
  background: repeating-linear-gradient(
    45deg,
    oklch(0.15 0 0) 0 8px,
    oklch(0.9 0 0) 8px 10px
  );
  color: #fff;
}
.img-ph[data-tone="punk"]::before {
  background: oklch(0.62 0.24 25);
  color: #fff;
}

/* Underground roundel marker */
.roundel {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border: 2.5px solid var(--mode-accent);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.roundel::after {
  content: '';
  position: absolute;
  left: -5px; right: -5px; top: 50%;
  height: 3px;
  background: var(--mode-accent);
  transform: translateY(-50%);
}
.roundel-xl { width: 40px; height: 40px; border-width: 4px; }
.roundel-xl::after { left: -10px; right: -10px; height: 6px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  background: transparent;
  transition: all 150ms ease;
  white-space: nowrap;
}
.btn:hover { background: currentColor; color: var(--mode-bg, var(--paper)); }
.btn-solid {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn-solid:hover { background: var(--accent); border-color: var(--accent); color: white; }
.btn-ghost { border-color: transparent; }
.btn-ghost:hover { background: transparent; color: var(--accent); }
.btn-sm { padding: 6px 10px; font-size: 10px; }

/* Chip / tag */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  border-radius: 999px;
  opacity: 0.8;
}
.chip-solid { background: var(--ink); color: var(--paper); border-color: var(--ink); opacity: 1; }

/* Layout helpers */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }
.between { justify-content: space-between; }
.center { align-items: center; justify-content: center; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-end { align-items: flex-end; }
.flex-1 { flex: 1; }
.grow { flex-grow: 1; }
.wrap { flex-wrap: wrap; }

/* Container widths */
.max-editorial { max-width: 1440px; margin: 0 auto; padding: 0 var(--edge); }
.max-narrow { max-width: 780px; margin: 0 auto; padding: 0 var(--edge); }
.max-wide { max-width: 1680px; margin: 0 auto; padding: 0 var(--edge); }

/* Scrollbar thin */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: oklch(0.8 0.008 60); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: oklch(0.6 0.008 60); }

/* =========================================================================
   Atlas — real MapLibre map + per-mode marker styles
   ========================================================================= */
.atlas-map-wrap { position: relative; border: 1px solid var(--rule); overflow: hidden; }
.atlas-map {
  width: 100%;
  aspect-ratio: 16/10;
  background: oklch(0.92 0.005 60);
}
.atlas-map-loading {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: oklch(0.35 0.01 60);
  background: oklch(0.96 0.005 60 / 0.85);
  z-index: 5;
}
.atlas-map-hover {
  position: absolute; left: 16px; bottom: 16px; max-width: 280px;
  background: white;
  border: 1px solid var(--rule);
  padding: 12px 14px;
  pointer-events: none;
  z-index: 4;
  box-shadow: 0 4px 18px rgba(0,0,0,0.1);
}
.atlas-map-wrap[data-mode="cinema"] .atlas-map-hover {
  background: oklch(0.12 0.02 240);
  color: oklch(0.96 0.005 60);
  border-color: oklch(0.3 0.03 240);
  box-shadow: 0 4px 22px rgba(0,0,0,0.5);
}
.atlas-attribution {
  position: absolute; right: 8px; top: 8px;
  font-family: var(--f-mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: rgba(255,255,255,0.75);
  color: oklch(0.35 0.01 60);
  padding: 2px 6px;
  z-index: 3;
  pointer-events: none;
}
.atlas-map-wrap[data-mode="cinema"] .atlas-attribution {
  background: rgba(0,0,0,0.55);
  color: oklch(0.85 0.14 90);
}
.atlas-letterbox {
  position: absolute; left: 0; right: 0;
  height: 28px;
  background: oklch(0.04 0.01 240);
  z-index: 2; pointer-events: none;
}
.atlas-letterbox-top    { top: 0; }
.atlas-letterbox-bottom { bottom: 0; }

/* MapLibre control tweaks to fit the design system */
.maplibregl-ctrl-group {
  border-radius: 0 \!important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) \!important;
  border: 1px solid var(--rule) \!important;
  background: oklch(0.98 0.004 60) \!important;
}
.maplibregl-ctrl-group button { border-radius: 0 \!important; }
.atlas-map-wrap[data-mode="cinema"] .maplibregl-ctrl-group {
  background: oklch(0.12 0.02 240) \!important;
  border-color: oklch(0.3 0.03 240) \!important;
}
.atlas-map-wrap[data-mode="cinema"] .maplibregl-ctrl-group button span {
  filter: invert(1);
}

/* =========================================================================
   Markers — three mode-specific grammars
   ========================================================================= */
.atlas-marker {
  display: grid; place-items: center;
  width: 32px; height: 32px;
  cursor: pointer;
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: transform 0.18s ease;
  will-change: transform;
}
.atlas-marker-n { position: relative; z-index: 2; line-height: 1; }
.atlas-marker:hover { z-index: 10; }

/* Punk — taped ransom label, red-orange, tilted, chunky Archivo Black */
.atlas-marker[data-mode="punk"] {
  background: oklch(0.62 0.24 25);
  color: oklch(0.98 0.004 60);
  border: 2px solid oklch(0.12 0.008 60);
  box-shadow: 2px 2px 0 oklch(0.12 0.008 60);
  transform: rotate(-4deg);
  font-family: 'Archivo Black', sans-serif;
  font-size: 12px;
  letter-spacing: 0;
  width: 30px; height: 30px;
}
.atlas-marker[data-mode="punk"]:hover { transform: rotate(-4deg) scale(1.2); }

/* Fashion — minimal oxblood ring, italic serif numeral */
.atlas-marker[data-mode="fashion"] {
  background: oklch(0.98 0.004 60);
  color: oklch(0.55 0.14 20);
  border: 1.5px solid oklch(0.55 0.14 20);
  border-radius: 50%;
  font-family: 'Bodoni Moda', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 13px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  width: 30px; height: 30px;
}
.atlas-marker[data-mode="fashion"]:hover { transform: scale(1.2); }

/* Cinema — subtitle-yellow dot with glow on dark base */
.atlas-marker[data-mode="cinema"] {
  background: oklch(0.12 0.02 240);
  color: oklch(0.88 0.14 90);
  border: 1.5px solid oklch(0.85 0.14 90);
  border-radius: 50%;
  box-shadow: 0 0 14px oklch(0.85 0.14 90 / 0.45);
  width: 28px; height: 28px;
  font-size: 10px;
}
.atlas-marker[data-mode="cinema"]:hover {
  transform: scale(1.22);
  box-shadow: 0 0 22px oklch(0.85 0.14 90 / 0.7);
}

</style>
<style data-src="styles/v2.css">
/* London Cuts V2 — additions on top of base.css
   ============================================
   The V1 token system (colors, fonts, mode grammars) is preserved.
   This file only adds NEW tokens + components introduced by V2:
     - workspace spine + canvas + drawers
     - slide-over panel (publish)
     - inline editable regions (postcard message, recipient)
     - content node type affordances (TipTap/Lexical preview)
     - live progress pips (spine stop rows)
     - atlas per-mode tile + marker refinements
*/

:root {
  /* V2: structural tokens for the workspace shell */
  --spine-w: 288px;
  --drawer-w: 340px;
  --topbar-h: 60px;
  --pip-size: 8px;

  /* V2: editable-state accent (shared across modes) */
  --edit-ring: oklch(0.62 0.18 230);     /* dim blue pencil */
  --edit-ring-punk: oklch(0.62 0.24 25);
  --edit-ring-fashion: oklch(0.55 0.14 20);
  --edit-ring-cinema: oklch(0.88 0.14 90);

  /* V2: status dot palette for media tasks */
  --status-queued: oklch(0.70 0.04 60);
  --status-running: oklch(0.72 0.17 90);
  --status-done: oklch(0.62 0.14 150);
  --status-failed: oklch(0.58 0.22 25);
}

/* =====================================================================
   WORKSPACE SHELL
   ===================================================================== */
.ws-shell {
  display: grid;
  grid-template-columns: var(--spine-w) 1fr auto;
  min-height: calc(100vh - var(--topbar-h));
  background: var(--mode-bg);
  color: var(--mode-ink);
  transition: background 300ms ease, color 300ms ease;
}

.ws-topbar {
  position: sticky; top: 0; z-index: 60;
  height: var(--topbar-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--mode-bg);
  color: var(--mode-ink);
  border-bottom: 1px solid oklch(from currentColor l c h / 0.15);
}

/* ---- spine ---- */
.spine {
  border-right: 1px solid oklch(from currentColor l c h / 0.12);
  padding: 14px 0;
  position: sticky; top: var(--topbar-h);
  align-self: flex-start;
  height: calc(100vh - var(--topbar-h));
  overflow-y: auto;
  background: oklch(from var(--mode-bg) calc(l - 0.015) c h);
}
.spine-hdr {
  padding: 4px 20px 12px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.spine-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 18px 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 150ms ease, border-color 150ms ease;
  position: relative;
}
.spine-row:hover { background: oklch(from currentColor l c h / 0.05); }
.spine-row[data-active="true"] {
  background: oklch(from currentColor l c h / 0.08);
  border-left-color: var(--mode-accent);
}
.spine-n {
  font-family: var(--f-mono);
  font-size: 11px;
  opacity: 0.6;
  letter-spacing: 0.08em;
}
.spine-row[data-active="true"] .spine-n { opacity: 1; }
.spine-title {
  font-family: var(--mode-display-font);
  font-size: 14px;
  line-height: 1.22;
  letter-spacing: -0.005em;
  text-wrap: pretty;
}
[data-mode="punk"] .spine-title { text-transform: uppercase; font-size: 12px; letter-spacing: 0.01em; }
[data-mode="fashion"] .spine-title { font-style: italic; }
[data-mode="cinema"] .spine-title { font-family: var(--f-serif); font-size: 15px; }
.spine-meta-row {
  grid-column: 2 / 4;
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px;
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  opacity: 0.6;
  text-transform: uppercase;
}
/* progress pips: each circle = one of {upload, hero, body, media} */
.pip-group { display: inline-flex; gap: 3px; }
.pip {
  width: var(--pip-size); height: var(--pip-size);
  border-radius: 50%;
  border: 1px solid oklch(from currentColor l c h / 0.5);
  background: transparent;
}
.pip[data-done="true"] { background: currentColor; border-color: currentColor; }
.pip[data-running="true"] {
  background: var(--status-running);
  border-color: var(--status-running);
  animation: pip-pulse 1.2s ease-in-out infinite;
}
@keyframes pip-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.3); opacity: 0.6; }
}
.spine-foot {
  padding: 16px 20px 4px;
  border-top: 1px dashed oklch(from currentColor l c h / 0.18);
  margin-top: 10px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  opacity: 0.65;
}

/* ---- canvas ---- */
.canvas {
  padding: 28px 40px 120px;
  min-width: 0;   /* allow children to shrink */
  max-width: 1180px;
}
[data-mode="fashion"] .canvas { max-width: 880px; margin: 0 auto; padding: 36px 48px 120px; }
[data-mode="cinema"]  .canvas { padding: 0 0 120px; }

/* Cinema letterbox frame around main */
[data-mode="cinema"] .canvas-inner {
  background: oklch(0.08 0.015 250);
  padding: 48px 56px;
  border-top: 28px solid oklch(0.02 0.01 240);
  border-bottom: 28px solid oklch(0.02 0.01 240);
  margin-top: 20px;
}

/* Punk asymmetric overlap */
[data-mode="punk"] .canvas { padding: 20px 28px 120px; }
[data-mode="punk"] .canvas-inner { position: relative; }

.canvas-hdr {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px; gap: 24px;
}
.canvas-title {
  font-family: var(--mode-display-font);
  font-size: 64px;
  line-height: 0.96;
  letter-spacing: -0.02em;
  text-wrap: balance;
}
[data-mode="punk"] .canvas-title { text-transform: uppercase; font-size: 72px; line-height: 0.88; }
[data-mode="fashion"] .canvas-title { font-style: italic; font-size: 72px; }
[data-mode="cinema"] .canvas-title { font-family: var(--f-serif); color: oklch(0.96 0.02 80); }

.hero-slot {
  position: relative;
  aspect-ratio: 16/9;
  border: 1px solid oklch(from currentColor l c h / 0.2);
  margin-bottom: 20px;
  overflow: hidden;
}
[data-mode="punk"] .hero-slot {
  transform: rotate(-1.2deg);
  border: 2px solid currentColor;
  box-shadow: 6px 6px 0 oklch(from currentColor l c h / 0.6);
}
[data-mode="cinema"] .hero-slot { aspect-ratio: 21/9; }

.asset-strip {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 120px;
  gap: 10px;
  overflow-x: auto;
  padding: 6px 2px 10px;
}
.asset-strip .cell {
  aspect-ratio: 1/1;
  border: 1px solid oklch(from currentColor l c h / 0.18);
  cursor: grab;
  position: relative;
}
.asset-strip .cell[data-hero="true"] {
  outline: 2px solid var(--mode-accent);
  outline-offset: -2px;
}
.asset-strip .cell[data-hero="true"]::after {
  content: 'HERO';
  position: absolute; top: 4px; left: 4px;
  font-family: var(--f-mono); font-size: 8px; letter-spacing: 0.14em;
  background: var(--mode-accent); color: var(--mode-bg);
  padding: 2px 4px;
}

/* ---- drawer ---- */
.drawers {
  width: var(--drawer-w);
  border-left: 1px solid oklch(from currentColor l c h / 0.12);
  position: sticky; top: var(--topbar-h);
  align-self: flex-start;
  height: calc(100vh - var(--topbar-h));
  display: flex; flex-direction: column;
  background: oklch(from var(--mode-bg) calc(l - 0.01) c h);
}
.drawer-tabs { display: flex; border-bottom: 1px solid oklch(from currentColor l c h / 0.12); }
.drawer-tab {
  flex: 1;
  padding: 14px 12px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-align: left;
  opacity: 0.5;
  cursor: pointer;
  border-right: 1px solid oklch(from currentColor l c h / 0.08);
}
.drawer-tab:last-child { border-right: none; }
.drawer-tab[data-active="true"] {
  opacity: 1;
  background: oklch(from currentColor l c h / 0.06);

}
.drawer-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

/* Assets pool grid */
.pool-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.pool-cell {
  position: relative;
  aspect-ratio: 1/1;
  cursor: grab;
}
.pool-cell[data-assigned="true"]::after {
  content: ''; position: absolute; inset: 0;
  background: oklch(0 0 0 / 0.55);
}
.pool-cell[data-assigned="true"]::before {
  content: attr(data-assigned-stop);
  position: absolute; top: 4px; right: 4px;
  font-family: var(--f-mono); font-size: 9px;
  background: var(--mode-accent); color: var(--mode-bg);
  padding: 1px 4px; z-index: 2;
  letter-spacing: 0.04em;
}

/* Task card */
.task-card {
  border: 1px solid oklch(from currentColor l c h / 0.15);
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
}
.task-card-hdr { display: flex; align-items: center; justify-content: space-between; }
.task-bar {
  height: 3px;
  background: oklch(from currentColor l c h / 0.15);
  margin-top: 8px; position: relative; overflow: hidden;
}
.task-bar-fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--status-running);
  transition: width 200ms ease;
}
.task-card[data-state="done"] .task-bar-fill { background: var(--status-done); width: 100% !important; }
.task-card[data-state="failed"] .task-bar-fill { background: var(--status-failed); width: 100% !important; }
.task-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  margin-right: 6px;
}
.task-dot[data-s="queued"]  { background: var(--status-queued); }
.task-dot[data-s="running"] { background: var(--status-running); animation: pip-pulse 1.2s ease-in-out infinite; }
.task-dot[data-s="done"]    { background: var(--status-done); }
.task-dot[data-s="failed"]  { background: var(--status-failed); }

/* =====================================================================

   ===================================================================== */
.node {
  position: relative;
  padding: 4px 0;

.node[data-selected="true"]::before {
  content: ''; position: absolute; inset: -6px -10px;
  border-left: 2px solid var(--mode-accent);
  background: oklch(from var(--mode-accent) l c h / 0.04);
  pointer-events: none;
}
.node-hint {
  position: absolute; top: 0; right: -74px;

  letter-spacing: 0.12em; text-transform: uppercase;

.n-para { font-size: 17px; line-height: 1.6; margin: 10px 0; max-width: 64ch; text-wrap: pretty; }
[data-mode="punk"] .n-para { font-family: var(--f-sans); }
[data-mode="fashion"] .n-para { font-size: 18px; line-height: 1.65; }
[data-mode="cinema"] .n-para {

  letter-spacing: 0.02em; max-width: 56ch;
}

/* heroImage */
.n-hero { margin: 22px 0; }
.n-hero .frame { aspect-ratio: 16/9; }

.n-hero-cap {
  font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;

.n-inline { display: grid; grid-template-columns: 180px 1fr; gap: 16px; margin: 16px 0; align-items: flex-start; }

.n-inline .frame { aspect-ratio: 3/4; }
.n-inline .cap { font-family: var(--f-mono); font-size: 11px; line-height: 1.4; opacity: 0.75; }

/* pullQuote */
.n-pull {

}
[data-mode="punk"] .n-pull {
  text-transform: uppercase; font-size: 34px; line-height: 1;

  background: currentColor; color: var(--mode-bg);

}

  letter-spacing: 0.02em;
}

/* mediaEmbed */
.n-embed {
  margin: 20px 0; position: relative;

}

.editable {

.editable[data-editing="true"] {

<script type="text/babel" data-src="src/shared.jsx">
// shared.jsx — V2 shared UI primitives.
// Reuses V1 Img + Roundel + ModeSwitcher conventions.

function Img({ label, tone, ratio = '3/2', style = {}, className = '' }) {
  return (
    <div
      className={`img-ph ${className}`}
      data-label={label}
      data-tone={tone}
      style={{ aspectRatio: ratio, width: '100%', ...style }}
    />
  );
}

function Roundel({ label, size = 'md', style = {} }) {
  const cls = size === 'xl' ? 'roundel roundel-xl' : 'roundel';
  return <span className={cls} style={style} aria-label={label} />;
}

// Top-bar mode pill (V2 styling: squared, on the workspace top bar).
function ModePill({ mode, onMode }) {
  const modes = [
    { id: 'punk', label: 'Punk' },
    { id: 'fashion', label: 'Fashion' },
    { id: 'cinema', label: 'Cinema' },
  ];
  return (
    <div className="mode-pill">
      {modes.map(m => (
        <button
          key={m.id}
          onClick={() => onMode(m.id)}
          data-active={mode === m.id}
        >{m.label}</button>
      ))}
    </div>
  );
}

// Progress pips — 4 dots per stop row: upload / hero / body / media.
// Running media is indicated by animation.
function Pips({ status }) {
  return (
    <span className="pip-group" aria-label="stop progress">
      <span className="pip" data-done={!!status.upload} title="upload" />
      <span className="pip" data-done={!!status.hero}   title="hero" />
      <span className="pip" data-done={!!status.body}   title="body" />
      <span className="pip"
            data-done={status.media === 'done'}
            data-running={status.media === 'running'}
            title="media" />
    </span>
  );
}

function Annot({ dir = 'left', style = {}, children }) {
  return (
    <div className="annot" data-dir={dir} style={style}>{children}</div>
  );
}

// A fake cursor caret for "editable" demos (static)
function Caret() {
  return (
    <span style={{
      display: 'inline-block', width: 1.5, height: '1em',
      background: 'var(--mode-accent)', verticalAlign: 'text-top',
      marginLeft: 1,
      animation: 'lc-caret 1s step-end infinite',
    }} />
  );
}

// Document frame caption — "FIG 3a — Fashion workspace, stop selected"
function FigCap({ n, text }) {
  return (
    <div className="frame-caption">
      <span style={{ opacity: 0.55 }}>FIG {n} — </span>{text}
    </div>
  );
}

// A small icon primitive for drawer tabs (2-char monogram). No svg icons.
function TabGlyph({ char }) {
  return (
    <span style={{
      display: 'inline-block',
      width: 16, height: 16,
      border: '1px solid currentColor',
      marginRight: 8,
      fontFamily: 'var(--f-mono)', fontSize: 9,
      textAlign: 'center', lineHeight: '14px',
    }}>{char}</span>
  );
}

Object.assign(window, { Img, Roundel, ModePill, Pips, Annot, Caret, FigCap, TabGlyph });

// Inject caret keyframe once.
(function injectCaret() {
  if (document.getElementById('lc-caret-kf')) return;
  const s = document.createElement('style');
  s.id = 'lc-caret-kf';
  s.textContent = '@keyframes lc-caret { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }';
  document.head.appendChild(s);
})();

</script>
<script type="text/babel" data-src="src/workspace.jsx">
// workspace.jsx — the V2 project workspace.
// One screen that replaces V1's Upload + Organize + Editor + Media + Publish.
// Spine (left) · Canvas (middle) · Drawers A/B (right, tabbed).
//
// The workspace re-renders the SAME content in the three modes, with
// meaningfully different layout grammar per mode (brief §What changes → 1).

function Workspace({ mode, onMode, onOpenPublish, onExitToProjects }) {
  const [selected, setSelected] = React.useState('05');
  const [drawerTab, setDrawerTab] = React.useState('assets');  // assets | queue
  const [drawerOpen, setDrawerOpen] = React.useState(true);
  const stop = STOPS.find(s => s.n === selected);
  const summary = projectSummary(STOPS);

  return (
    <div className="page" data-mode={mode}>
      {/* top bar */}
      <div className="ws-topbar">
        <div className="row items-center gap-16">
          <button className="mono-sm" onClick={onExitToProjects} style={{ opacity: 0.6 }}>← Projects</button>
          <Roundel />
          <div style={{ fontFamily: 'var(--mode-display-font)', fontSize: 15, lineHeight: 1 }}>
            {PROJECT.title}
          </div>
          <span className="mono-sm" style={{ opacity: 0.45 }}>DRAFT · ED.01 · {summary.totalComplete}/{summary.total} STOPS READY</span>
        </div>
        <div className="row items-center gap-16">
          <ModePill mode={mode} onMode={onMode} />
          <button className="btn" onClick={() => setDrawerOpen(o => !o)}>{drawerOpen ? 'Hide panels →' : '← Show panels'}</button>
          <button className="btn btn-solid" onClick={onOpenPublish}>Publish →</button>
        </div>
      </div>

      <div className="ws-shell" style={{ gridTemplateColumns: drawerOpen ? `var(--spine-w) 1fr var(--drawer-w)` : `var(--spine-w) 1fr` }}>
        <Spine selected={selected} onSelect={setSelected} />
        <WSCanvas mode={mode} stop={stop} key={selected /* reset per stop */} />
        {drawerOpen && (
          <WSDrawers tab={drawerTab} onTab={setDrawerTab} selectedStop={selected} mode={mode} />
        )}
      </div>
    </div>
  );
}

// ---- Spine ----------------------------------------------------------------
function Spine({ selected, onSelect }) {
  const summary = projectSummary(STOPS);
  return (
    <aside className="spine">
      <div className="spine-hdr">
        <div className="eyebrow">12 stops</div>
        <div className="eyebrow" style={{ opacity: 0.6 }}>{summary.totalComplete}/{summary.total}</div>
      </div>
      {STOPS.map(s => (
        <div
          key={s.n}
          className="spine-row"
          data-active={selected === s.n}
          onClick={() => onSelect(s.n)}
        >
          <span className="spine-n">{s.n}</span>
          <span className="spine-title">{s.title}</span>
          <Pips status={s.status} />
          <div className="spine-meta-row">
            <span>{s.code}</span>
            <span style={{ opacity: 0.6 }}>·</span>
            <span>{s.time}</span>
          </div>
        </div>
      ))}
      <div className="spine-foot">
        <div>{summary.missingHeroes} stops without hero · {summary.missingBodies} without body</div>
        <div style={{ marginTop: 6 }}>{summary.missingUploads ? `${summary.missingUploads} stops need uploads` : 'All stops have uploads'}</div>
      </div>
    </aside>
  );
}

// ---- Canvas (per-stop workspace body) -------------------------------------
function WSCanvas({ mode, stop }) {
  // Only Stop 05 carries the demo body / postcard state for the prototype.
  const isDemo = stop.n === '05';
  return (
    <main className="canvas">
      <div className="canvas-inner">
        <CanvasHeader stop={stop} mode={mode} />
        <div className="overline-divider">Hero &amp; assets for stop {stop.n}</div>
        <HeroSlot stop={stop} mode={mode} />
        <AssetStrip stop={stop} />
        <div className="overline-divider">Body</div>
        {isDemo
          ? <StoryEditorDemo mode={mode} />
          : <EmptyBodyHint stop={stop} mode={mode} />}
        <div className="overline-divider">Postcard preview</div>
        <PostcardTile stop={stop} mode={mode} />
      </div>
    </main>
  );
}

function CanvasHeader({ stop, mode }) {
  return (
    <div className="canvas-hdr">
      <div>
        <div className="eyebrow" style={{ opacity: 0.75 }}>
          Stop {stop.n} · {stop.code} · {stop.time} · {stop.mood}
        </div>
        <h1 className="canvas-title" style={{ marginTop: 10 }}>{stop.title}</h1>
      </div>
      <div className="col items-end gap-8" style={{ flexShrink: 0 }}>
        <span className="mono-sm" style={{ opacity: 0.65 }}>
          {stop.status.body ? 'Body: 3 paragraphs · 1 quote' : 'Body: empty'}
        </span>
        <span className="mono-sm" style={{ opacity: 0.65 }}>
          Media task: {stop.status.media ?? '—'}
        </span>
      </div>
    </div>
  );
}

function HeroSlot({ stop, mode }) {
  if (!stop.status.hero) {
    return (
      <div className="hero-slot" style={{
        display: 'grid', placeItems: 'center',
        borderStyle: 'dashed',
        minHeight: 280,
      }}>
        <div className="col items-center gap-8">
          <div className="mono-sm" style={{ opacity: 0.65 }}>Pick a hero from the asset strip</div>
          <button className="btn btn-sm">Drop image here</button>
        </div>
      </div>
    );
  }
  return <Img label={stop.label + ' · HERO'} tone={stop.tone} ratio="16/9" style={{ aspectRatio: 'auto', height: mode === 'cinema' ? 360 : 440 }} />;
}

function AssetStrip({ stop }) {
  const assigned = POOL_ASSETS.filter(a => a.stop === stop.n);
  const hero = assigned[0];
  if (assigned.length === 0) {
    return (
      <div className="mono-sm" style={{ opacity: 0.55, padding: '8px 2px' }}>
        No assets assigned yet. Drag from the Assets pool →
      </div>
    );
  }
  return (
    <div className="asset-strip">
      {assigned.map(a => (
        <div key={a.id} className="cell" data-hero={a.id === hero.id}>
          <Img label={a.id.toUpperCase()} tone={a.tone} ratio="1/1" style={{ aspectRatio: 'auto', height: '100%' }} />
        </div>
      ))}
      <div className="cell" style={{ borderStyle: 'dashed', display: 'grid', placeItems: 'center' }}>
        <span className="mono-sm" style={{ opacity: 0.55 }}>+ drop</span>
      </div>
    </div>
  );
}

function EmptyBodyHint({ stop, mode }) {
  return (
    <div style={{ padding: '28px 0' }}>
      <p className="n-para" style={{ opacity: 0.6, fontStyle: 'italic' }}>
        Nothing written for Stop {stop.n} yet. Press <kbd style={{
          fontFamily: 'var(--f-mono)', fontSize: 10,
          border: '1px solid currentColor', padding: '1px 5px', margin: '0 2px', opacity: 0.8,
        }}>/</kbd> to insert a block, or just start typing{stop.status.hero ? '.' : ' — a hero image would help.'}
      </p>
    </div>
  );
}

// ---- Story Editor demo (Stop 05) ------------------------------------------
function StoryEditorDemo({ mode }) {
  const [selected, setSelected] = React.useState(3);       // the pullQuote
  const [slashOpen, setSlashOpen] = React.useState(false);
  return (
    <div style={{ position: 'relative' }}>
      {BODY_05.map((node, i) => (
        <ContentNode
          key={i}
          node={node}
          selected={selected === i}
          onSelect={() => setSelected(i)}
          mode={mode}
        />
      ))}

      {/* trailing "/" affordance */}
      <div style={{ position: 'relative', padding: '12px 0 4px' }}>
        <div className="mono-sm" style={{ opacity: 0.55, cursor: 'pointer' }}
             onClick={() => setSlashOpen(o => !o)}>
          + add block  <span style={{ marginLeft: 6, opacity: 0.8 }}>/</span>
        </div>
        {slashOpen && (
          <div className="slash" style={{ top: 34, left: 0 }}>
            {[
              ['Paragraph',  'Enter'],
              ['Hero image', '/hero'],
              ['Inline image','/img'],
              ['Pull quote', '/quote'],
              ['Media embed','/embed'],
              ['Meta row',   '/meta'],
            ].map(([label, kbd], i) => (
              <div key={label} className="slash-item" data-focus={i === 0} onClick={() => setSlashOpen(false)}>
                <span>{label}</span>
                <span className="slash-kbd">{kbd}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ---- Content node renderer ------------------------------------------------
function ContentNode({ node, selected, onSelect, mode }) {
  const hint = {
    paragraph: 'PARA',
    heroImage: 'HERO',
    inlineImage: 'INLINE',
    pullQuote: 'QUOTE',
    mediaEmbed: 'EMBED',
    metaRow: 'META',
  }[node.type];

  const body = (() => {
    switch (node.type) {
      case 'paragraph':
        return <p className="n-para">{node.content}</p>;
      case 'metaRow':
        return (
          <div className="n-meta">
            {node.content.map((c, i) => <span key={i}>{c}</span>)}
          </div>
        );
      case 'heroImage':
        return (
          <div className="n-hero">
            <Img label={node.caption} tone="warm" ratio={mode === 'cinema' ? '21/9' : '16/9'} className="frame" style={{ aspectRatio: 'auto', height: mode === 'cinema' ? 320 : 380 }} />
            <div className="n-hero-cap">{node.caption}</div>
          </div>
        );
      case 'inlineImage':
        return (
          <div className="n-inline">
            <Img label={node.assetId.toUpperCase()} tone="warm" ratio="3/4" className="frame" style={{ aspectRatio: 'auto', height: 240 }} />
            <div className="cap">{node.caption}</div>
          </div>
        );
      case 'pullQuote':
        return <blockquote className="n-pull">{node.content}</blockquote>;
      case 'mediaEmbed':
        return (
          <div className="n-embed">
            <Img label="IMG2VID · 03.0s" tone={mode === 'cinema' ? 'dark' : 'warm'} ratio="16/9" style={{ aspectRatio: 'auto', height: '100%' }} />
            <div className="n-embed-tag">img2vid · done</div>
            <div className="play">▶  play</div>
          </div>
        );
    }
  })();

  return (
    <div className="node" data-selected={selected} onClick={onSelect}>
      {body}
      <span className="node-hint">{hint}</span>
    </div>
  );
}

// ---- Postcard tile (preview, click to open editor) ------------------------
function PostcardTile({ stop, mode }) {
  const isDemo = stop.n === '05';
  if (!isDemo) {
    return (
      <div style={{
        aspectRatio: '7/5', maxWidth: 420,
        border: '1px dashed oklch(from currentColor l c h / 0.35)',
        display: 'grid', placeItems: 'center',
      }}>

function MediaQueueDrawer({ mode }) {
  const [tasks, setTasks] = React.useState(SEED_TASKS);
  // Animate the two "running" bars so the queue feels live.
  React.useEffect(() => {
    const t = setInterval(() => {
      setTasks(prev => prev.map(x =>
        x.state === 'running'
          ? { ...x, progress: Math.min(0.98, x.progress + 0.01 + Math.random() * 0.02) }
          : x
      ));
    }, 420);
    return () => clearInterval(t);
  }, []);

  const counts = {
    running: tasks.filter(t => t.state === 'running').length,
    queued:  tasks.filter(t => t.state === 'queued').length,
    done:    tasks.filter(t => t.state === 'done').length,
    failed:  tasks.filter(t => t.state === 'failed').length,
  };

  return (
    <div className="col gap-16">
      <div>
        <div className="eyebrow">Tasks · {tasks.length}</div>
        <div className="mono-sm" style={{ opacity: 0.55, marginTop: 4 }}>
          {counts.running} running · {counts.queued} queued · {counts.done} done · {counts.failed} failed
        </div>
      </div>
      <div>
        {tasks.map(t => (
          <div key={t.id} className="task-card" data-state={t.state}>
            <div className="task-card-hdr">
              <span className="mono-sm">
                <span className="task-dot" data-s={t.state} />
                STOP {t.stopId} · {t.kind}
              </span>
              <span className="mono-sm" style={{ opacity: 0.55 }}>{t.mode}</span>
            </div>
            <div style={{ marginTop: 6, fontSize: 12, opacity: 0.8, lineHeight: 1.4 }}>{t.prompt}</div>
            <div className="task-bar">
              <div className="task-bar-fill" style={{ width: `${Math.round(t.progress * 100)}%` }} />
            </div>
            <div className="row between" style={{ marginTop: 6 }}>
              <span className="mono-sm" style={{ opacity: 0.55 }}>
                {t.state === 'running' ? `${Math.round(t.progress * 100)}%` :
                 t.state === 'done'    ? 'result ready · drag →' :
                 t.state === 'failed'  ? 'mock: lost frame' :
                 'waiting in queue'}
              </span>
              {t.state === 'failed' && <button className="mono-sm" style={{ color: 'var(--status-failed)' }}>Retry</button>}
              {t.state === 'done'   && <button className="mono-sm" style={{ opacity: 0.7 }}>Insert ↓</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// --- Stylized stand-in for MapLibre (uses real SE1 coord bounds) ---
// This is the prototype version — the engineering spec in HANDOFF-V2
// ships the MapLibre style JSON per mode.
function StylizedMap({ mode, hover, setHover, onPick, selectedStop }) {
  // Project SE1 coords into viewBox 0..1000 × 0..600
  const lats = STOPS.map(s => s.lat), lngs = STOPS.map(s => s.lng);
  const minLat = Math.min(...lats) - 0.006, maxLat = Math.max(...lats) + 0.006;
  const minLng = Math.min(...lngs) - 0.006, maxLng = Math.max(...lngs) + 0.006;
  const x = lng => ((lng - minLng) / (maxLng - minLng)) * 1000;
  const y = lat => (1 - (lat - minLat) / (maxLat - minLat)) * 600;

  const bg = mode === 'cinema' ? '#050a18' : mode === 'punk' ? '#f0ece0' : '#f7f1e6';
  const stroke = mode === 'cinema' ? '#16213a' : mode === 'punk' ? '#1a1a1a' : '#bfa886';
  const river  = mode === 'cinema' ? '#0a1628' : mode === 'punk' ? '#d8d4c4' : '#e8d9b8';
  const label  = mode === 'cinema' ? '#8a93a8' : mode === 'punk' ? '#4a4a4a' : '#9a7f54';

  // A simple polyline for the Thames meander through SE1
  const thames = 'M 40 180  C 200 140, 320 260, 480 220  S 780 300, 980 240';

  return (
    <div className="atlas-map" style={{ background: bg, position: 'relative' }}>
      <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" style={{ width: '100%', height: '100%', display: 'block' }}>
        {/* grid roads */}
        <g stroke={stroke} strokeWidth={mode === 'punk' ? 1.2 : 0.8} opacity={mode === 'cinema' ? 0.25 : 0.35}>
          {Array.from({length: 16}).map((_, i) => (
            <line key={'h'+i} x1={0} x2={1000} y1={i * 40} y2={i * 40} />
          ))}
          {Array.from({length: 25}).map((_, i) => (
            <line key={'v'+i} x1={i * 44} x2={i * 44} y1={0} y2={600} />
          ))}
        </g>
        {/* major avenues */}
        <g stroke={stroke} strokeWidth={mode === 'punk' ? 3.2 : 2.2} opacity={0.8}>
          <line x1={0}   y1={320} x2={1000} y2={260} />
          <line x1={260} y1={0}   x2={360}  y2={600} />
          <line x1={680} y1={0}   x2={580}  y2={600} />
        </g>
        {/* Thames */}
        <path d={thames} fill="none" stroke={river} strokeWidth={mode === 'punk' ? 28 : 36} strokeLinecap="round" />
        <path d={thames} fill="none" stroke={stroke} strokeWidth={0.6} opacity={0.35} strokeDasharray={mode === 'punk' ? '2 3' : '0'} />
        {/* Borough labels */}
        <g fontFamily="var(--f-mono)" fontSize={mode === 'cinema' ? 10 : 11} fill={label} letterSpacing="2">
          <text x={120} y={520} opacity={0.6}>BERMONDSEY</text>
          <text x={420} y={90}  opacity={0.6}>BOROUGH</text>
          <text x={760} y={140} opacity={0.6}>LAMBETH</text>
          <text x={860} y={520} opacity={0.5}>WALWORTH</text>
        </g>
      </svg>

      {/* Markers */}
      {STOPS.map(s => (
        <div
          key={s.n}
          className="atlas-marker"
          data-mode={mode}
          style={{
            position: 'absolute',
            left: `calc(${x(s.lng) / 10}% - 15px)`,
            top:  `calc(${y(s.lat) / 6}% - 15px)`,
            zIndex: selectedStop === s.n ? 20 : (hover === s.n ? 15 : 5),
            transform: selectedStop === s.n
              ? (mode === 'punk' ? 'rotate(-4deg) scale(1.25)' : 'scale(1.25)')
              : undefined,
            outline: selectedStop === s.n ? `2px solid var(--mode-accent)` : undefined,
            outlineOffset: selectedStop === s.n ? 3 : undefined,
          }}
          onClick={() => onPick(s.n)}
          onMouseEnter={() => setHover(s.n)}
          onMouseLeave={() => setHover(null)}
        >
          <span className="atlas-marker-n">{s.n}</span>
        </div>
      ))}

      {/* Hover preview card */}
      {hover && (() => {
        const s = STOPS.find(x => x.n === hover);
        return s ? (
          <div className="atlas-map-hover">
            <div className="mono-sm" style={{ opacity: 0.6 }}>STOP {s.n} · {s.code}</div>
            <div style={{ fontFamily: 'var(--mode-display-font)', fontSize: 18, marginTop: 4, lineHeight: 1.15 }}>{s.title}</div>
            <div className="mono-sm" style={{ marginTop: 4, opacity: 0.7 }}>{s.time} · {s.mood}</div>
          </div>
        ) : null;
      })()}

      {/* attribution */}
      <div className="atlas-attribution">© OpenStreetMap © CARTO</div>
    </div>
  );
}

// Stop detail renders content nodes in the current mode.
function StopDetail({ stop, mode }) {

          }}>{stop.title}</h2>
        </div>
      </div>

      <div style={{ maxWidth: mode === 'cinema' ? 780 : 920 }}>
        {body.map((node, i) => (
          <ContentNode key={i} node={node} selected={false} onSelect={() => {}} mode={mode} />
        ))}
      </div>
    </div>
  );
}

</script>

<script type="text/babel" data-src="src/handoff-doc.jsx">
// handoff-doc.jsx — The V2 handoff document itself.
// Scrolling long-form with embedded live prototypes (each in its own chrome).
// Think of it as a spec doc the implementation side reads top to bottom.

const { useState } = React;

function App() {
  // The doc can navigate into full-screen live views for each prototype.
  const [route, setRoute] = useState('doc');        // doc | workspace | public | postcard | projects | publish
  const [mode, setMode] = useState('fashion');
  const [publishOpen, setPublishOpen] = useState(false);

  if (route === 'workspace') {
    return (
      <>
        <Workspace
          mode={mode} onMode={setMode}
          onOpenPublish={() => setPublishOpen(true)}
          onExitToProjects={() => setRoute('projects')}
        />
        {publishOpen && <PublishSlideover mode={mode} onClose={() => setPublishOpen(false)} />}
      </>
    );
  }
  if (route === 'public')    return <PublicProject mode={mode} onMode={setMode} onExit={() => setRoute('doc')} />;
  if (route === 'postcard')  return <PostcardEditor mode={mode} onMode={setMode} onClose={() => setRoute('workspace')} />;
  if (route === 'projects')  return <ProjectsList onOpenWorkspace={() => setRoute('workspace')} onExit={() => setRoute('doc')} />;

  return <HandoffDoc goTo={setRoute} mode={mode} setMode={setMode} />;
}

function HandoffDoc({ goTo, mode, setMode }) {
  return (
    <div className="doc">
      <DocTopBar />
      <HeroIntro goTo={goTo} />
      <S1_IA />
      <S2_Workspace mode={mode} setMode={setMode} goTo={goTo} />
      <S3_PublicScroll mode={mode} setMode={setMode} goTo={goTo} />
      <S4_AtlasKits />
      <S5_ContentNodes mode={mode} setMode={setMode} />
      <S6_PostcardEditor mode={mode} setMode={setMode} goTo={goTo} />
      <S7_PublishSlideover mode={mode} setMode={setMode} />
      <S8_SystemDiff />
      <S9_EngNotes />
      <S10_Responsive />
      <Footer />
    </div>
  );
}

  return (
