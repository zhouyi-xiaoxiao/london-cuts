  <!-- Base styles -->
  <style data-src="styles/base.css">
/* London Cuts — base styles, design tokens, mode grammars */

:root {
  /* Neutrals — warm paper */
  --paper: oklch(0.985 0.004 60);
  --paper-2: oklch(0.96 0.005 60);
  --paper-3: oklch(0.92 0.006 60);
  --ink: oklch(0.14 0.008 60);
  --ink-2: oklch(0.32 0.008 60);
  --ink-3: oklch(0.55 0.008 60);
  --rule: oklch(0.88 0.006 60);

  /* Accent (mode-agnostic) */
  --accent: oklch(0.55 0.14 20);

  /* Type scale */
  --f-display: 'Archivo Black', 'Archivo', system-ui, sans-serif;
  --f-serif: 'Instrument Serif', 'Times New Roman', serif;
  --f-fashion: 'Bodoni Moda', 'Didot', 'Bodoni 72', serif;
  --f-sans: 'Archivo', system-ui, -apple-system, sans-serif;
  --f-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --f-hand: 'Caveat', cursive;

  /* Grid */
  --gutter: 24px;
  --edge: 40px;

  /* Mode tokens — overridden per mode */
  --mode-bg: var(--paper);
  --mode-ink: var(--ink);
  --mode-accent: var(--accent);
  --mode-display-font: var(--f-serif);
  --mode-body-font: var(--f-sans);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
input, textarea, select { font: inherit; color: inherit; background: none; border: none; outline: none; }

/* ———————————————————————————————————————————
   MODE GRAMMARS — change typography, rhythm, spacing
——————————————————————————————————————————— */

/* PUNK — zine, collage, raw, asymmetric, black on white with red */
[data-mode="punk"] {
  --mode-bg: oklch(0.97 0 0);
  --mode-ink: oklch(0.08 0 0);
  --mode-accent: oklch(0.62 0.24 25);
  --mode-display-font: var(--f-display);
  --mode-body-font: var(--f-sans);
}

/* FASHION — editorial, whitespace, bold crop, elegant serif */
[data-mode="fashion"] {
  --mode-bg: oklch(0.98 0.008 75);
  --mode-ink: oklch(0.16 0.01 40);
  --mode-accent: oklch(0.45 0.12 25);
  --mode-display-font: var(--f-fashion);
  --mode-body-font: var(--f-sans);
}

/* CINEMA — scene card, subtitle, moody, dark */
[data-mode="cinema"] {
  --mode-bg: oklch(0.12 0.015 250);
  --mode-ink: oklch(0.92 0.01 80);
  --mode-accent: oklch(0.88 0.14 90);
  --mode-display-font: var(--f-serif);
  --mode-body-font: var(--f-mono);
}

/* ———————————————————————————————————————————
   PRIMITIVES
——————————————————————————————————————————— */

.page { min-height: 100vh; background: var(--mode-bg, var(--paper)); color: var(--mode-ink, var(--ink)); transition: background 400ms ease, color 400ms ease; }

.rule { height: 1px; background: currentColor; opacity: 0.15; }
.rule-heavy { height: 2px; background: currentColor; }

.mono { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
.mono-sm { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

.eyebrow { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7; }

/* Image placeholders — striped, with mono caption */
.img-ph {
  position: relative;
  background: repeating-linear-gradient(
    135deg,
    oklch(0.88 0.01 60) 0 10px,
    oklch(0.92 0.008 60) 10px 20px
  );
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  color: oklch(0.35 0.01 60);
}
.img-ph::before {
  content: attr(data-label);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 12px;
  background: oklch(0.98 0.004 60 / 0.9);
  margin: 10px;
  border-radius: 2px;
}
.img-ph[data-tone="dark"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.2 0.01 250) 0 10px,
    oklch(0.24 0.01 250) 10px 20px
  );
  color: oklch(0.7 0.01 60);
}
.img-ph[data-tone="dark"]::before {
  background: oklch(0.15 0.01 250 / 0.9);
  color: oklch(0.85 0.01 60);
}
.img-ph[data-tone="warm"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.82 0.04 50) 0 10px,
    oklch(0.86 0.03 55) 10px 20px
  );
}
.img-ph[data-tone="cool"] {
  background: repeating-linear-gradient(
    135deg,
    oklch(0.78 0.04 240) 0 10px,
    oklch(0.82 0.03 235) 10px 20px
  );
}
.img-ph[data-tone="punk"] {
  background: repeating-linear-gradient(
    45deg,
    oklch(0.15 0 0) 0 8px,
    oklch(0.9 0 0) 8px 10px
  );
  color: #fff;
}
.img-ph[data-tone="punk"]::before {
  background: oklch(0.62 0.24 25);
  color: #fff;
}

/* Underground roundel marker */
.roundel {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border: 2.5px solid var(--mode-accent);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.roundel::after {
  content: '';
  position: absolute;
  left: -5px; right: -5px; top: 50%;
  height: 3px;
  background: var(--mode-accent);
  transform: translateY(-50%);
}
.roundel-xl { width: 40px; height: 40px; border-width: 4px; }
.roundel-xl::after { left: -10px; right: -10px; height: 6px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  background: transparent;
  transition: all 150ms ease;
  white-space: nowrap;
}
.btn:hover { background: currentColor; color: var(--mode-bg, var(--paper)); }
.btn-solid {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn-solid:hover { background: var(--accent); border-color: var(--accent); color: white; }
.btn-ghost { border-color: transparent; }
.btn-ghost:hover { background: transparent; color: var(--accent); }
.btn-sm { padding: 6px 10px; font-size: 10px; }

/* Chip / tag */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  border-radius: 999px;
  opacity: 0.8;
}
.chip-solid { background: var(--ink); color: var(--paper); border-color: var(--ink); opacity: 1; }

/* Layout helpers */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }
.between { justify-content: space-between; }
.center { align-items: center; justify-content: center; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-end { align-items: flex-end; }
.flex-1 { flex: 1; }
.grow { flex-grow: 1; }
.wrap { flex-wrap: wrap; }

/* Container widths */
.max-editorial { max-width: 1440px; margin: 0 auto; padding: 0 var(--edge); }
.max-narrow { max-width: 780px; margin: 0 auto; padding: 0 var(--edge); }
.max-wide { max-width: 1680px; margin: 0 auto; padding: 0 var(--edge); }

/* Scrollbar thin */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: oklch(0.8 0.008 60); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: oklch(0.6 0.008 60); }

/* =========================================================================
   Atlas — real MapLibre map + per-mode marker styles
   ========================================================================= */
.atlas-map-wrap { position: relative; border: 1px solid var(--rule); overflow: hidden; }
.atlas-map {
  width: 100%;
  aspect-ratio: 16/10;
  background: oklch(0.92 0.005 60);
}
.atlas-map-loading {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: oklch(0.35 0.01 60);
  background: oklch(0.96 0.005 60 / 0.85);
  z-index: 5;
}
.atlas-map-hover {
  position: absolute; left: 16px; bottom: 16px; max-width: 280px;
  background: white;
  border: 1px solid var(--rule);
  padding: 12px 14px;
  pointer-events: none;
  z-index: 4;
  box-shadow: 0 4px 18px rgba(0,0,0,0.1);
}
.atlas-map-wrap[data-mode="cinema"] .atlas-map-hover {
  background: oklch(0.12 0.02 240);
  color: oklch(0.96 0.005 60);
  border-color: oklch(0.3 0.03 240);
  box-shadow: 0 4px 22px rgba(0,0,0,0.5);
}
.atlas-attribution {
  position: absolute; right: 8px; top: 8px;
  font-family: var(--f-mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: rgba(255,255,255,0.75);
  color: oklch(0.35 0.01 60);
  padding: 2px 6px;
  z-index: 3;
  pointer-events: none;
}
.atlas-map-wrap[data-mode="cinema"] .atlas-attribution {
  background: rgba(0,0,0,0.55);
  color: oklch(0.85 0.14 90);
}
.atlas-letterbox {
  position: absolute; left: 0; right: 0;
  height: 28px;
  background: oklch(0.04 0.01 240);
  z-index: 2; pointer-events: none;
}
.atlas-letterbox-top    { top: 0; }
.atlas-letterbox-bottom { bottom: 0; }

/* MapLibre control tweaks to fit the design system */
.maplibregl-ctrl-group {
  border-radius: 0 !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
  border: 1px solid var(--rule) !important;
  background: oklch(0.98 0.004 60) !important;
}
.maplibregl-ctrl-group button { border-radius: 0 !important; }
.atlas-map-wrap[data-mode="cinema"] .maplibregl-ctrl-group {
  background: oklch(0.12 0.02 240) !important;
  border-color: oklch(0.3 0.03 240) !important;
}
.atlas-map-wrap[data-mode="cinema"] .maplibregl-ctrl-group button span {
  filter: invert(1);
}

/* =========================================================================
   Markers — three mode-specific grammars
   ========================================================================= */
.atlas-marker {
  display: grid; place-items: center;
  width: 32px; height: 32px;
  cursor: pointer;
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: transform 0.18s ease;
  will-change: transform;
}
.atlas-marker-n { position: relative; z-index: 2; line-height: 1; }
.atlas-marker:hover { z-index: 10; }

/* Punk — taped ransom label, red-orange, tilted, chunky Archivo Black */
.atlas-marker[data-mode="punk"] {
  background: oklch(0.62 0.24 25);
  color: oklch(0.98 0.004 60);
  border: 2px solid oklch(0.12 0.008 60);
  box-shadow: 2px 2px 0 oklch(0.12 0.008 60);
  transform: rotate(-4deg);
  font-family: 'Archivo Black', sans-serif;
  font-size: 12px;
  letter-spacing: 0;
  width: 30px; height: 30px;
}
.atlas-marker[data-mode="punk"]:hover { transform: rotate(-4deg) scale(1.2); }

/* Fashion — minimal oxblood ring, italic serif numeral */
.atlas-marker[data-mode="fashion"] {
  background: oklch(0.98 0.004 60);
  color: oklch(0.55 0.14 20);
  border: 1.5px solid oklch(0.55 0.14 20);
  border-radius: 50%;
  font-family: 'Bodoni Moda', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 13px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  width: 30px; height: 30px;
}
.atlas-marker[data-mode="fashion"]:hover { transform: scale(1.2); }

/* Cinema — subtitle-yellow dot with glow on dark base */
.atlas-marker[data-mode="cinema"] {
  background: oklch(0.12 0.02 240);
  color: oklch(0.88 0.14 90);
  border: 1.5px solid oklch(0.85 0.14 90);
  border-radius: 50%;
  box-shadow: 0 0 14px oklch(0.85 0.14 90 / 0.45);
  width: 28px; height: 28px;
  font-size: 10px;
}
.atlas-marker[data-mode="cinema"]:hover {
  transform: scale(1.22);
  box-shadow: 0 0 22px oklch(0.85 0.14 90 / 0.7);
}

</style>
  <style data-src="styles/v2.css">
/* London Cuts V2 — additions on top of base.css
   ============================================
   The V1 token system (colors, fonts, mode grammars) is preserved.
   This file only adds NEW tokens + components introduced by V2:
     - workspace spine + canvas + drawers
     - slide-over panel (publish)
     - inline editable regions (postcard message, recipient)
     - content node type affordances (TipTap/Lexical preview)
     - live progress pips (spine stop rows)
     - atlas per-mode tile + marker refinements
*/

:root {
  /* V2: structural tokens for the workspace shell */
  --spine-w: 288px;
  --drawer-w: 340px;
  --topbar-h: 60px;
  --pip-size: 8px;

  /* V2: editable-state accent (shared across modes) */
  --edit-ring: oklch(0.62 0.18 230);     /* dim blue pencil */
  --edit-ring-punk: oklch(0.62 0.24 25);
  --edit-ring-fashion: oklch(0.55 0.14 20);
  --edit-ring-cinema: oklch(0.88 0.14 90);

  /* V2: status dot palette for media tasks */
  --status-queued: oklch(0.70 0.04 60);
  --status-running: oklch(0.72 0.17 90);
  --status-done: oklch(0.62 0.14 150);
  --status-failed: oklch(0.58 0.22 25);
}

/* =====================================================================
   WORKSPACE SHELL
   ===================================================================== */
.ws-shell {
  display: grid;
  grid-template-columns: var(--spine-w) 1fr auto;
  min-height: calc(100vh - var(--topbar-h));
  background: var(--mode-bg);
  color: var(--mode-ink);
  transition: background 300ms ease, color 300ms ease;
}

.ws-topbar {
  position: sticky; top: 0; z-index: 60;
  height: var(--topbar-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--mode-bg);
  color: var(--mode-ink);
  border-bottom: 1px solid oklch(from currentColor l c h / 0.15);
}

/* ---- spine ---- */
.spine {
  border-right: 1px solid oklch(from currentColor l c h / 0.12);
  padding: 14px 0;
  position: sticky; top: var(--topbar-h);
  align-self: flex-start;
  height: calc(100vh - var(--topbar-h));
  overflow-y: auto;
  background: oklch(from var(--mode-bg) calc(l - 0.015) c h);
}
.spine-hdr {
  padding: 4px 20px 12px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.spine-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 18px 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 150ms ease, border-color 150ms ease;
  position: relative;
}
.spine-row:hover { background: oklch(from currentColor l c h / 0.05); }
.spine-row[data-active="true"] {
  background: oklch(from currentColor l c h / 0.08);
  border-left-color: var(--mode-accent);
}
.spine-n {
  font-family: var(--f-mono);
  font-size: 11px;
  opacity: 0.6;
  letter-spacing: 0.08em;
}
.spine-row[data-active="true"] .spine-n { opacity: 1; }
.spine-title {
  font-family: var(--mode-display-font);
  font-size: 14px;
  line-height: 1.22;
  letter-spacing: -0.005em;
  text-wrap: pretty;
}
[data-mode="punk"] .spine-title { text-transform: uppercase; font-size: 12px; letter-spacing: 0.01em; }
[data-mode="fashion"] .spine-title { font-style: italic; }
[data-mode="cinema"] .spine-title { font-family: var(--f-serif); font-size: 15px; }
.spine-meta-row {
  grid-column: 2 / 4;
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px;
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  opacity: 0.6;
  text-transform: uppercase;
}
/* progress pips: each circle = one of {upload, hero, body, media} */
.pip-group { display: inline-flex; gap: 3px; }
.pip {
  width: var(--pip-size); height: var(--pip-size);
  border-radius: 50%;
  border: 1px solid oklch(from currentColor l c h / 0.5);
  background: transparent;
}
.pip[data-done="true"] { background: currentColor; border-color: currentColor; }
.pip[data-running="true"] {
  background: var(--status-running);
  border-color: var(--status-running);
  animation: pip-pulse 1.2s ease-in-out infinite;
}
@keyframes pip-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.3); opacity: 0.6; }
}
.spine-foot {
  padding: 16px 20px 4px;
  border-top: 1px dashed oklch(from currentColor l c h / 0.18);
  margin-top: 10px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  opacity: 0.65;
}

/* ---- canvas ---- */
.canvas {
  padding: 28px 40px 120px;
  min-width: 0;   /* allow children to shrink */
  max-width: 1180px;
}
[data-mode="fashion"] .canvas { max-width: 880px; margin: 0 auto; padding: 36px 48px 120px; }
[data-mode="cinema"]  .canvas { padding: 0 0 120px; }

/* Cinema letterbox frame around main */
[data-mode="cinema"] .canvas-inner {
  background: oklch(0.08 0.015 250);
  padding: 48px 56px;
  border-top: 28px solid oklch(0.02 0.01 240);
  border-bottom: 28px solid oklch(0.02 0.01 240);
  margin-top: 20px;
}

/* Punk asymmetric overlap */
[data-mode="punk"] .canvas { padding: 20px 28px 120px; }
[data-mode="punk"] .canvas-inner { position: relative; }

.canvas-hdr {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px; gap: 24px;
}
.canvas-title {
  font-family: var(--mode-display-font);
  font-size: 64px;
  line-height: 0.96;
  letter-spacing: -0.02em;
  text-wrap: balance;
}
[data-mode="punk"] .canvas-title { text-transform: uppercase; font-size: 72px; line-height: 0.88; }
[data-mode="fashion"] .canvas-title { font-style: italic; font-size: 72px; }
[data-mode="cinema"] .canvas-title { font-family: var(--f-serif); color: oklch(0.96 0.02 80); }

.hero-slot {
  position: relative;
  aspect-ratio: 16/9;
  border: 1px solid oklch(from currentColor l c h / 0.2);
  margin-bottom: 20px;
  overflow: hidden;
}
[data-mode="punk"] .hero-slot {
  transform: rotate(-1.2deg);
  border: 2px solid currentColor;
  box-shadow: 6px 6px 0 oklch(from currentColor l c h / 0.6);
}
[data-mode="cinema"] .hero-slot { aspect-ratio: 21/9; }

.asset-strip {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 120px;
  gap: 10px;
  overflow-x: auto;
  padding: 6px 2px 10px;
}
.asset-strip .cell {
  aspect-ratio: 1/1;
  border: 1px solid oklch(from currentColor l c h / 0.18);
  cursor: grab;
  position: relative;
}
.asset-strip .cell[data-hero="true"] {
  outline: 2px solid var(--mode-accent);
  outline-offset: -2px;
}
.asset-strip .cell[data-hero="true"]::after {
  content: 'HERO';
  position: absolute; top: 4px; left: 4px;
  font-family: var(--f-mono); font-size: 8px; letter-spacing: 0.14em;
  background: var(--mode-accent); color: var(--mode-bg);
  padding: 2px 4px;
}

/* ---- drawer ---- */
.drawers {
  width: var(--drawer-w);
  border-left: 1px solid oklch(from currentColor l c h / 0.12);
  position: sticky; top: var(--topbar-h);
  align-self: flex-start;
  height: calc(100vh - var(--topbar-h));
  display: flex; flex-direction: column;
  background: oklch(from var(--mode-bg) calc(l - 0.01) c h);
}

// shared.jsx — V2 shared UI primitives.
// Reuses V1 Img + Roundel + ModeSwitcher conventions.

function Img({ label, tone, ratio = '3/2', style = {}, className = '' }) {
  return (
    <div
      className={`img-ph ${className}`}
      data-label={label}
      data-tone={tone}
      style={{ aspectRatio: ratio, width: '100%', ...style }}
    />
  );
}

function Roundel({ label, size = 'md', style = {} }) {
  const cls = size === 'xl' ? 'roundel roundel-xl' : 'roundel';
  return <span className={cls} style={style} aria-label={label} />;
}

// Top-bar mode pill (V2 styling: squared, on the workspace top bar).
function ModePill({ mode, onMode }) {
  const modes = [
    { id: 'punk', label: 'Punk' },
    { id: 'fashion', label: 'Fashion' },
    { id: 'cinema', label: 'Cinema' },
  ];
  return (
    <div className="mode-pill">
      {modes.map(m => (
        <button
          key={m.id}
          onClick={() => onMode(m.id)}
          data-active={mode === m.id}
        >{m.label}</button>
      ))}
    </div>
  );
}

// Progress pips — 4 dots per stop row: upload / hero / body / media.
// Running media is indicated by animation.
function Pips({ status }) {
  return (
    <span className="pip-group" aria-label="stop progress">
      <span className="pip" data-done={!!status.upload} title="upload" />
      <span className="pip" data-done={!!status.hero}   title="hero" />
      <span className="pip" data-done={!!status.body}   title="body" />
      <span className="pip"
            data-done={status.media === 'done'}
            data-running={status.media === 'running'}
            title="media" />
    </span>
  );
}

function Annot({ dir = 'left', style = {}, children }) {
  return (
    <div className="annot" data-dir={dir} style={style}>{children}</div>
  );
}

// A fake cursor caret for "editable" demos (static)
function Caret() {
  return (
    <span style={{
      display: 'inline-block', width: 1.5, height: '1em',
      background: 'var(--mode-accent)', verticalAlign: 'text-top',
      marginLeft: 1,
      animation: 'lc-caret 1s step-end infinite',
    }} />
  );
}

// Document frame caption — "FIG 3a — Fashion workspace, stop selected"
function FigCap({ n, text }) {
  return (
    <div className="frame-caption">
      <span style={{ opacity: 0.55 }}>FIG {n} — </span>{text}
    </div>
  );
}

// A small icon primitive for drawer tabs (2-char monogram). No svg icons.
function TabGlyph({ char }) {
  return (
    <span style={{
      display: 'inline-block',
      width: 16, height: 16,
      border: '1px solid currentColor',
      marginRight: 8,
      fontFamily: 'var(--f-mono)', fontSize: 9,
      textAlign: 'center', lineHeight: '14px',
    }}>{char}</span>
  );
}

Object.assign(window, { Img, Roundel, ModePill, Pips, Annot, Caret, FigCap, TabGlyph });

// Inject caret keyframe once.
(function injectCaret() {
  if (document.getElementById('lc-caret-kf')) return;
  const s = document.createElement('style');
  s.id = 'lc-caret-kf';
  s.textContent = '@keyframes lc-caret { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }';
  document.head.appendChild(s);
})();

// store.jsx — V3 nested store with useSyncExternalStore + localStorage persistence
//
// Shape (hierarchical, supports multiple stores in future):
// {
//   project: { title, author, subtitle, defaultMode, visibility, slug, tags[], reads, saves, duration, coverLabel, published },
//   stops: [ { n, code, title, time, mood, tone, lat, lng, label, status, body[], postcard, heroAssetId, assetIds[] } ],
//   assetsPool: [ { id, stop, tone, imageUrl?, generatedAt?, prompt?, revisedPrompt? } ],
//   mediaTasks: [ { id, kind, stopId, mode, state, progress, prompt } ],
//   ui: { mode, drawerOpen, drawerTab, publishOpen, activeStopId },
//   openai: { sessionKey } (memory-only, never persisted)
// }
//
// Persistence: localStorage key 'lc_store_v3', excludes ui + openai.
// Migration: from lc_store_v2 (flat shape) to V3 (nested).

const LC_STORE_KEY_V3 = 'lc_store_v3';
const LC_STORE_KEY_V2 = 'lc_store_v2'; // fallback for migration

const STOP_IMAGES = {
  '01': 'https://picsum.photos/seed/lc-borough-market/1200/800',
  '02': 'https://picsum.photos/seed/lc-shard-london/1200/800',
  '03': 'https://picsum.photos/seed/lc-tate-turbine/1200/800',
  '04': 'https://picsum.photos/seed/lc-thames-mudlark/1200/800',
  '05': 'https://picsum.photos/seed/lc-waterloo-dusk/1200/800',
  '06': 'https://picsum.photos/seed/lc-national-theatre/1200/800',
  '07': 'https://picsum.photos/seed/lc-southwark-pub/1200/800',
  '08': 'https://picsum.photos/seed/lc-bermondsey-neon/1200/800',
  '09': 'https://picsum.photos/seed/lc-london-streetlight/1200/800',
  '10': 'https://picsum.photos/seed/lc-tower-bridge-dawn/1200/800',
  '11': 'https://picsum.photos/seed/lc-guys-chapel/1200/800',
  '12': 'https://picsum.photos/seed/lc-elephant-castle/1200/800',
};

const DEFAULT_MESSAGE = 'M — walked home across Waterloo last night. The river caught. Thought of you in Lisbon. Six minutes of gold, then nothing.\n— A.';
const DEFAULT_RECIPIENT = {
  name: '',
  line1: '',
  line2: '',
  country: '',
};

function lcInitialState() {
  // Build stops from global STOPS + BODY_05, POSTCARD_05
  const stops = STOPS.map(stop => {
    const isStop05 = stop.n === '05';
    return {
      ...stop,
      body: isStop05 ? BODY_05 : [],
      postcard: isStop05 ? POSTCARD_05 : {
        message: '',
        recipient: { ...DEFAULT_RECIPIENT },
      },
      heroAssetId: null,
      assetIds: [],
    };
  });

  // Build assetsPool with image URLs
  const assetsPool = POOL_ASSETS.map(asset => ({
    ...asset,
    imageUrl: asset.stop ? STOP_IMAGES[asset.stop] : null,
  }));

  return {
    project: { ...PROJECT },
    stops,
    assetsPool,
    mediaTasks: SEED_TASKS.map(t => ({ ...t })),
    ui: {
      mode: 'fashion',
      drawerOpen: false,
      drawerTab: null,
      publishOpen: false,
      activeStopId: null,
    },
    openai: {
      sessionKey: null,
    },
  };
}

function lcMigrateV2ToV3(v2State) {
  // Migrate from flat V2 shape to nested V3.
  // V2 had: project, assets[], stops[], assetsPool[], mediaTasks[], postcardVersions
  // V3 needs: full nested shape with ui, openai, restructured stops with postcard objects
  const stops = (v2State.stops || []).map(stop => {
    const isStop05 = stop.n === '05';
    return {
      ...stop,
      body: stop.body || (isStop05 ? BODY_05 : []),
      postcard: {
        message: stop.message || (isStop05 ? POSTCARD_05.message : ''),
        recipient: stop.recipient || (isStop05 ? POSTCARD_05.recipient : { ...DEFAULT_RECIPIENT }),
      },
      heroAssetId: stop.heroAssetId || null,
      assetIds: stop.assetIds || [],
    };
  });

  const assetsPool = (v2State.assetsPool || []).map(id => {
    const origAsset = POOL_ASSETS.find(a => a.id === id);
    return origAsset ? { ...origAsset, imageUrl: origAsset.stop ? STOP_IMAGES[origAsset.stop] : null } : null;
  }).filter(Boolean);

  return {
    project: v2State.project || PROJECT,
    stops,
    assetsPool,
    mediaTasks: v2State.mediaTasks || SEED_TASKS,
    ui: {
      mode: 'fashion',
      drawerOpen: false,
      drawerTab: null,
      publishOpen: false,
      activeStopId: null,
    },
    openai: { sessionKey: null },
  };
}

function lcLoadStore() {
  try {
    // Try V3 key first
    let raw = localStorage.getItem(LC_STORE_KEY_V3);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Re-init ui + openai (never persisted)
      return {
        ...parsed,
        ui: {
          mode: parsed.ui?.mode || 'fashion',
          drawerOpen: false,
          drawerTab: null,
          publishOpen: false,
          activeStopId: null,
        },
        openai: { sessionKey: null },
      };
    }

    // Fallback to V2 key for migration
    raw = localStorage.getItem(LC_STORE_KEY_V2);
    if (raw) {
      const parsed = JSON.parse(raw);
      const upgraded = lcMigrateV2ToV3(parsed);
      // Persist under V3 key for next load
      lcPersist(upgraded, true);
      return upgraded;
    }

    // Fresh start
    return lcInitialState();
  } catch (e) {
    console.warn('[lc] store parse failed, resetting', e);
    return lcInitialState();
  }
}

function lcPersist(state, forceV3 = false) {
  try {
    // Persist all EXCEPT ui + openai
    const safe = {
      project: state.project,
      stops: state.stops,
      assetsPool: state.assetsPool,
      mediaTasks: state.mediaTasks,
    };
    localStorage.setItem(LC_STORE_KEY_V3, JSON.stringify(safe));
  } catch (e) {
    console.warn('[lc] store persist failed', e);
  }
}

let __lcState = lcLoadStore();
const __lcSubs = new Set();

function lcGetState() {
  return __lcState;
}

function lcSetState(updater) {
  const next = typeof updater === 'function' ? updater(__lcState) : updater;
  if (next === __lcState) return;
  __lcState = next;
  lcPersist(__lcState);
  __lcSubs.forEach(fn => {
    try { fn(__lcState); } catch (e) { console.error(e); }
  });
}

function lcSubscribe(fn) {
  __lcSubs.add(fn);
  return () => __lcSubs.delete(fn);
}

function lcResetStore() {
  __lcState = lcInitialState();
  lcPersist(__lcState);
  __lcSubs.forEach(fn => fn(__lcState));
}

// React hook using useSyncExternalStore (requires React 18+)
function useLCStore(selector) {
  return React.useSyncExternalStore(lcSubscribe, () => selector(__lcState));
}

// Helper: get hero image URL for a stop
function getStopImageUrl(stopId) {
  const stop = __lcState.stops.find(s => s.n === stopId);
  if (!stop) return null;
  if (stop.heroAssetId) {
    const asset = __lcState.assetsPool.find(a => a.id === stop.heroAssetId);
    return asset?.imageUrl || null;
  }
  return STOP_IMAGES[stopId] || null;
}

// Store actions
const storeActions = {
  setMode(mode) {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, mode },
    }));
  },
  setActiveStop(id) {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, activeStopId: id },
    }));
  },
  openDrawer(tab) {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, drawerOpen: true, drawerTab: tab },
    }));
  },
  closeDrawer() {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, drawerOpen: false, drawerTab: null },
    }));
  },
  openPublish() {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, publishOpen: true },
    }));
  },
  closePublish() {
    lcSetState(s => ({
      ...s,
      ui: { ...s.ui, publishOpen: false },
    }));
  },
  setStopBody(stopId, body) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId ? { ...st, body } : st),
    }));
  },
  setPostcardMessage(stopId, text) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId
        ? { ...st, postcard: { ...st.postcard, message: text } }
        : st),
    }));
  },
  setRecipient(stopId, recipient) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId
        ? { ...st, postcard: { ...st.postcard, recipient: { ...st.postcard.recipient, ...recipient } } }
        : st),
    }));
  },
  setStopStatus(stopId, patch) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId
        ? { ...st, status: { ...st.status, ...patch } }
        : st),
    }));
  },
  setVisibility(vis) {
    lcSetState(s => ({
      ...s,
      project: { ...s.project, visibility: vis },
    }));
  },
  setDefaultMode(mode) {
    lcSetState(s => ({
      ...s,
      project: { ...s.project, defaultMode: mode },
    }));
  },
  setSlug(slug) {
    lcSetState(s => ({
      ...s,
      project: { ...s.project, slug },
    }));
  },
  setTitle(title) {
    lcSetState(s => ({
      ...s,
      project: { ...s.project, title },
    }));
  },
  setHeroAssetId(stopId, assetId) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId ? { ...st, heroAssetId: assetId } : st),
    }));
  },
  addAssetToStop(stopId, assetId) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId
        ? { ...st, assetIds: [...new Set([...st.assetIds, assetId])] }
        : st),
    }));
  },
  removeAssetFromStop(stopId, assetId) {
    lcSetState(s => ({
      ...s,
      stops: s.stops.map(st => st.n === stopId
        ? { ...st, assetIds: st.assetIds.filter(id => id !== assetId) }
        : st),
    }));
  },
  setAssetImageUrl(assetId, url) {
    lcSetState(s => ({
      ...s,
      assetsPool: s.assetsPool.map(asset => asset.id === assetId
        ? { ...asset, imageUrl: url }
        : asset),
    }));
  },
  setGeneratedImage(stopId, { url, prompt, revisedPrompt }) {
    const newId = `gen-${stopId}-${Date.now()}`;
    lcSetState(s => {
      const newAsset = {
        id: newId,
        stop: stopId,
        tone: 'generated',
        imageUrl: url,
        generatedAt: Date.now(),
        prompt,
        revisedPrompt,
      };
      return {
        ...s,
        assetsPool: [...s.assetsPool, newAsset],
        stops: s.stops.map(st => st.n === stopId
          ? { ...st, heroAssetId: newId }
          : st),
      };
    });
  },
  setOpenaiSessionKey(key) {
    lcSetState(s => ({
      ...s,
      openai: { ...s.openai, sessionKey: key },
    }));
  },
};

Object.assign(window, {
  LCStore: { getState: lcGetState, setState: lcSetState, subscribe: lcSubscribe, reset: lcResetStore },
  useLCStore,
  storeActions,
  getStopImageUrl,
  DEFAULT_MESSAGE,
  DEFAULT_RECIPIENT,
  STOP_IMAGES,
});

</script>
  <script type="text/babel" data-src="src/workspace.jsx">

// ---- Spine ----------------------------------------------------------------

// ---- Content node renderer ------------------------------------------------
function ContentNode({ node, selected, onSelect, mode }) {

    paragraph: 'PARA',

            <div key={a.id} className="pool-cell" data-assigned={true} data-assigned-stop={a.stop}>

          ))}
        </div>
      </div>
    </div>

function MediaQueueDrawer({ mode }) {
  const [tasks, setTasks] = React.useState(SEED_TASKS);
  // Animate the two "running" bars so the queue feels live.
  React.useEffect(() => {
    const t = setInterval(() => {
      setTasks(prev => prev.map(x =>
        x.state === 'running'
          ? { ...x, progress: Math.min(0.98, x.progress + 0.01 + Math.random() * 0.02) }
          : x
      ));
    }, 420);
    return () => clearInterval(t);
  }, []);

  const counts = {
    running: tasks.filter(t => t.state === 'running').length,
    queued:  tasks.filter(t => t.state === 'queued').length,
    done:    tasks.filter(t => t.state === 'done').length,
    failed:  tasks.filter(t => t.state === 'failed').length,
  };

  return (
    <div className="col gap-16">
      <div>
        <div className="eyebrow">Tasks · {tasks.length}</div>
        <div className="mono-sm" style={{ opacity: 0.55, marginTop: 4 }}>
          {counts.running} running · {counts.queued} queued · {counts.done} done · {counts.failed} failed
        </div>
      </div>
      <div>
        {tasks.map(t => (
          <div key={t.id} className="task-card" data-state={t.state}>
            <div className="task-card-hdr">
              <span className="mono-sm">
                <span className="task-dot" data-s={t.state} />
                STOP {t.stopId} · {t.kind}
              </span>
              <span className="mono-sm" style={{ opacity: 0.55 }}>{t.mode}</span>
            </div>
            <div style={{ marginTop: 6, fontSize: 12, opacity: 0.8, lineHeight: 1.4 }}>{t.prompt}</div>
            <div className="task-bar">
              <div className="task-bar-fill" style={{ width: `${Math.round(t.progress * 100)}%` }} />
            </div>
            <div className="row between" style={{ marginTop: 6 }}>
              <span className="mono-sm" style={{ opacity: 0.55 }}>
                {t.state === 'running' ? `${Math.round(t.progress * 100)}%` :
                 t.state === 'done'    ? 'result ready · drag →' :
                 t.state === 'failed'  ? 'mock: lost frame' :
                 'waiting in queue'}
              </span>
              {t.state === 'failed' && <button className="mono-sm" style={{ color: 'var(--status-failed)' }}>Retry</button>}
              {t.state === 'done'   && <button className="mono-sm" style={{ opacity: 0.7 }}>Insert ↓</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { Workspace });

  <script type="text/babel" data-src="src/public-atlas.jsx">
// public-atlas.jsx — Real MapLibre GL map with SE1 stops at real coordinates.
// Three mode-specific tile treatments + three mode-specific marker styles.
//
// Library load: maplibre-gl is lazy-loaded from unpkg CDN the first time the
// Atlas screen mounts. Offline users will see the "loading map…" overlay.

// ---- Real SE1 coordinates for the 10 stops in A Year in SE1 ----------------
// These align with STOPS[n].n in data.jsx. They are real SE1 latlngs — you can
// drop them into Google Maps and land on the right block.
const STOP_COORDS = {
  '01': { lng: -0.0910, lat: 51.5055 },  // Borough Market
  '02': { lng: -0.0867, lat: 51.5050 },  // The Shard / Crucifix Lane
  '03': { lng: -0.0991, lat: 51.5076 },  // Tate Modern Turbine Hall
  '04': { lng: -0.1161, lat: 51.5074 },  // Thames foreshore (South Bank)
  '05': { lng: -0.1164, lat: 51.5090 },  // Waterloo Bridge, east side
  '06': { lng: -0.1148, lat: 51.5068 },  // National Theatre façade
  '07': { lng: -0.0974, lat: 51.5037 },  // A pub off Southwark Street
  '08': { lng: -0.0812, lat: 51.4992 },  // Bermondsey Street
  '09': { lng: -0.0754, lat: 51.4964 },  // Grange Road
  '10': { lng: -0.0754, lat: 51.5055 },  // Tower Bridge, north side
};

// ---- Mode-aware style skeletons --------------------------------------------
// We keep to raster OSM tiles (no token) and steer the vibe via raster paint
// props. The V2 brief asks for three distinct map worlds — this is a first
// pass we can hand to Claude Design as the starting point.
const TILES = {
  voyager: 'https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
  dark:    'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
};
const ATTR = '© OpenStreetMap © CARTO';

function buildMapStyle(mode) {
  if (mode === 'cinema') {
    return {
      version: 8,
      sources: { t: { type: 'raster', tiles: [TILES.dark], tileSize: 256, attribution: ATTR } },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#050a18' } },
        { id: 't', type: 'raster', source: 't', paint: {
          'raster-saturation': -0.4,
          'raster-hue-rotate': 210,
          'raster-brightness-min': 0.0,
          'raster-brightness-max': 0.6,
          'raster-contrast': 0.15,
          'raster-opacity': 0.95,
        } },
      ],
    };
  }
  if (mode === 'punk') {
    return {
      version: 8,
      sources: { t: { type: 'raster', tiles: [TILES.voyager], tileSize: 256, attribution: ATTR } },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#f4f1e8' } },
        { id: 't', type: 'raster', source: 't', paint: {
          'raster-saturation': -1,
          'raster-contrast': 0.5,
          'raster-brightness-min': 0.08,
          'raster-brightness-max': 0.92,
        } },
      ],
    };
  }
  // fashion — cream paper, low-sat warm ink
  return {
    version: 8,
    sources: { t: { type: 'raster', tiles: [TILES.voyager], tileSize: 256, attribution: ATTR } },
    layers: [
      { id: 'bg', type: 'background', paint: { 'background-color': '#f7f1e6' } },
      { id: 't', type: 'raster', source: 't', paint: {
        'raster-saturation': -0.55,
        'raster-hue-rotate': 10,
        'raster-brightness-min': 0.8,
        'raster-brightness-max': 1.0,
        'raster-opacity': 0.8,
        'raster-contrast': -0.05,
      } },
    ],
  };
}

// ---- Lazy loader for maplibre-gl -------------------------------------------
function useMapLibre() {
  const [loaded, setLoaded] = React.useState(() => !!window.maplibregl);
  React.useEffect(() => {
    if (loaded) return;

    if (!document.querySelector('link[data-maplibre]')) {
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css';
      l.setAttribute('data-maplibre', '1');
      document.head.appendChild(l);
    }

    let s = document.querySelector('script[data-maplibre]');
    if (!s) {
      s = document.createElement('script');
      s.src = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js';
      s.async = true;
      s.setAttribute('data-maplibre', '1');
      document.head.appendChild(s);
    }
    const poll = setInterval(() => {
      if (window.maplibregl) { setLoaded(true); clearInterval(poll); }
    }, 80);
    return () => clearInterval(poll);
  }, [loaded]);
  return loaded;
}

// ---- The map component -----------------------------------------------------
function StopAtlas({ mode, onStopClick }) {
  const containerRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const markersRef = React.useRef([]);
  const clustersRef = React.useRef([]);
  const [hover, setHover] = React.useState(null);
  const [clusters, setClusters] = React.useState([]);
  const libLoaded = useMapLibre();

  // Helper: build hover card content with hero image or tone swatch
  const buildHoverCard = (stop) => {
    let heroImg = null;
    try {
      // Try Agent E's helper first
      if (window.storeActions?.getStopImageUrl) {
        heroImg = window.storeActions.getStopImageUrl(stop.n);
      }
      // Fallback to direct store access
      if (!heroImg) {
        const state = window.LCStore?.getState?.();
        if (state && state.stops) {
          const stopData = state.stops.find(s => s.id === stop.n);
          if (stopData && stopData.heroAssetId && state.assets) {
            const asset = state.assets.find(a => a.id === stopData.heroAssetId);
            if (asset && asset.blobUrl) {
              heroImg = asset.blobUrl;
            }
          }
        }
      }
    } catch (e) {
      // Silently fail if store unavailable
    }

    const card = document.createElement('div');
    card.className = 'atlas-hover-card';
    card.dataset.mode = mode;

    // Stop number badge
    const badge = document.createElement('div');
    badge.className = 'atlas-hover-badge';
    badge.textContent = stop.n;
    card.appendChild(badge);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'atlas-hover-thumb';
    if (heroImg) {
      thumb.style.backgroundImage = `url(${heroImg})`;
      thumb.style.backgroundSize = 'cover';
      thumb.style.backgroundPosition = 'center';
    } else {
      const toneColor = stop.tone || 'warm';
      thumb.dataset.tone = toneColor;
      thumb.className = 'atlas-hover-thumb atlas-hover-thumb-swatch';
    }
    card.appendChild(thumb);

    // Title
    const title = document.createElement('div');
    title.className = 'atlas-hover-title';
    title.textContent = stop.title;
    card.appendChild(title);

    // Meta
    const meta = document.createElement('div');
    meta.className = 'atlas-hover-meta mono-sm';
    meta.textContent = (stop.label || stop.code || 'SE1') + (stop.time ? ' · ' + stop.time : '');
    card.appendChild(meta);

    return card;
  };

  // Helper: compute cluster bounds
  const getClusterBounds = (cluster) => {
    const coords = cluster.stops.map(s => STOP_COORDS[s.n]).filter(Boolean);
    if (!coords.length) return null;
    const bounds = new window.maplibregl.LngLatBounds();
    coords.forEach(c => bounds.extend([c.lng, c.lat]));
    return bounds;
  };

  // Helper: update clusters on zoom/pan
  const updateClusters = () => {
    if (!mapRef.current || !mapRef.current.loaded()) return;

    clustersRef.current.forEach(m => m.remove());
    clustersRef.current = [];
    setClusters([]);

    const stops = window.STOPS || [];
    const projections = stops.map(s => ({
      stop: s,
      screen: mapRef.current.project([STOP_COORDS[s.n].lng, STOP_COORDS[s.n].lat]),
    }));

    const placed = new Set();
    const newClusters = [];

    for (const { stop, screen } of projections) {
      if (placed.has(stop.n)) continue;

      let foundCluster = false;
      for (const cluster of newClusters) {
        const clusterScreens = cluster.stops.map(s => {
          const c = STOP_COORDS[s.n];
          return mapRef.current.project([c.lng, c.lat]);
        });
        const minDist = Math.min(
          ...clusterScreens.map(cs =>
            Math.hypot(screen.x - cs.x, screen.y - cs.y)
          )
        );
        if (minDist < 40) {
          cluster.stops.push(stop);
          placed.add(stop.n);
          foundCluster = true;
          break;
        }
      }

      if (!foundCluster) {
        newClusters.push({ stops: [stop], screen });
        placed.add(stop.n);
      }
    }

    newClusters.forEach(cluster => {
      if (cluster.stops.length < 2) return;

      const clusterScreen = cluster.stops.reduce(
        (acc, s) => {
          const proj = mapRef.current.project([STOP_COORDS[s.n].lng, STOP_COORDS[s.n].lat]);
          return { x: acc.x + proj.x, y: acc.y + proj.y };
        },
        { x: 0, y: 0 }
      );
      clusterScreen.x /= cluster.stops.length;
      clusterScreen.y /= cluster.stops.length;

      const clusterEl = document.createElement('div');
      clusterEl.className = 'atlas-cluster';
      clusterEl.dataset.mode = mode;
      clusterEl.innerHTML = `<span class="atlas-cluster-count">${cluster.stops.length}</span><span class="atlas-cluster-label">stops</span>`;
      clusterEl.style.position = 'absolute';
      clusterEl.style.transform = `translate(calc(-50% + ${clusterScreen.x}px), calc(-50% + ${clusterScreen.y}px))`;
      clusterEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const bounds = getClusterBounds(cluster);
        if (bounds) {
          const currentZoom = mapRef.current.getZoom();
          const targetZoom = Math.min(currentZoom + 2, 15);
          mapRef.current.fitBounds(bounds, { padding: 60, maxZoom: targetZoom, duration: 600 });
        }
      });

      containerRef.current.appendChild(clusterEl);
      clustersRef.current.push({ remove: () => clusterEl.remove() });
    });

    setClusters(newClusters);
  };

  // Initialize once library is ready
  React.useEffect(() => {
    if (!libLoaded || !containerRef.current || mapRef.current) return;

    const map = new window.maplibregl.Map({
      container: containerRef.current,
      style: buildMapStyle(mode),
      center: [-0.0980, 51.5035],
      zoom: 14.2,
      minZoom: 12,
      maxZoom: 18,
      attributionControl: false,
    });
    map.addControl(new window.maplibregl.NavigationControl({ showCompass: false, visualizePitch: false }), 'bottom-right');
    mapRef.current = map;

    const addMarkers = () => {
      if (markersRef.current.length) return;
      (window.STOPS || []).forEach((stop) => {
        const coords = STOP_COORDS[stop.n];
        if (!coords) return;
        const el = document.createElement('div');
        el.className = 'atlas-marker';
        el.dataset.mode = mode;
        el.innerHTML = '<span class="atlas-marker-n">' + stop.n + '</span>';
        
        const hoverCard = buildHoverCard(stop);
        let popupShown = false;
        
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          map.flyTo({ center: [coords.lng, coords.lat], zoom: 15.5, duration: 600, essential: true });
          map.once('moveend', () => {
            if (onStopClick) onStopClick(stop);
          });
        });
        
        el.addEventListener('mouseenter', () => {
          if (!popupShown) {
            hoverCard.style.position = 'absolute';
            hoverCard.style.bottom = '100%';
            hoverCard.style.left = '50%';
            hoverCard.style.transform = 'translateX(-50%)';
            hoverCard.style.marginBottom = '12px';
            hoverCard.style.zIndex = '20';
            el.appendChild(hoverCard);
            popupShown = true;
          }
        });
        
        el.addEventListener('mouseleave', () => {
          if (popupShown && hoverCard.parentNode) {
            hoverCard.parentNode.removeChild(hoverCard);
            popupShown = false;
          }
        });
        
        const marker = new window.maplibregl.Marker({ element: el, anchor: 'center' })
          .setLngLat([coords.lng, coords.lat])
          .addTo(map);
        markersRef.current.push(marker);
      });

      const bounds = new window.maplibregl.LngLatBounds();
      (window.STOPS || []).forEach((s) => {
        const c = STOP_COORDS[s.n];
        if (c) bounds.extend([c.lng, c.lat]);
      });
      if (!bounds.isEmpty()) {
        map.fitBounds(bounds, { padding: { top: 60, right: 40, bottom: 100, left: 40 }, maxZoom: 15, duration: 0 });
      }
    };

    if (map.isStyleLoaded()) addMarkers();
    else map.once('load', addMarkers);

    const handleMapChange = () => {
      setTimeout(updateClusters, 50);
    };
    map.on('zoom', handleMapChange);
    map.on('zoomend', handleMapChange);
    map.on('move', handleMapChange);

    return () => {
      map.off('zoom', handleMapChange);
      map.off('zoomend', handleMapChange);
      map.off('move', handleMapChange);
      clustersRef.current.forEach(c => c.remove?.());
      clustersRef.current = [];
      markersRef.current.forEach((m) => m.remove());
      markersRef.current = [];
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
    };
  }, [libLoaded]);

  // Mode change → swap tile style; update marker and cluster CSS
  React.useEffect(() => {
    if (!mapRef.current) return;
    mapRef.current.setStyle(buildMapStyle(mode));
    markersRef.current.forEach((m) => {
      const el = m.getElement();
      el.dataset.mode = mode;
    });
    clustersRef.current.forEach((c, i) => {
      const el = document.querySelectorAll('.atlas-cluster')[i];
      if (el) el.dataset.mode = mode;
    });
  }, [mode]);

  return (
    <div className="atlas-map-wrap" data-mode={mode}>
      <div ref={containerRef} className="atlas-map" />
      {!libLoaded && (
        <div className="atlas-map-loading mono-sm">loading map…</div>
      )}
      {mode === 'cinema' && (
        <>
          <div className="atlas-letterbox atlas-letterbox-top" />
          <div className="atlas-letterbox atlas-letterbox-bottom" />
        </>
      )}
      <div className="atlas-attribution">{ATTR}</div>
    </div>
  );
}

// --- Stylized stand-in for MapLibre (uses real SE1 coord bounds) ---
// This is the prototype version — the engineering spec in HANDOFF-V2
// ships the MapLibre style JSON per mode.
function StylizedMap({ mode, hover, setHover, onPick, selectedStop }) {
  // Project SE1 coords into viewBox 0..1000 × 0..600
  const lats = STOPS.map(s => s.lat), lngs = STOPS.map(s => s.lng);
  const minLat = Math.min(...lats) - 0.006, maxLat = Math.max(...lats) + 0.006;
  const minLng = Math.min(...lngs) - 0.006, maxLng = Math.max(...lngs) + 0.006;
  const x = lng => ((lng - minLng) / (maxLng - minLng)) * 1000;
  const y = lat => (1 - (lat - minLat) / (maxLat - minLat)) * 600;

  const bg = mode === 'cinema' ? '#050a18' : mode === 'punk' ? '#f0ece0' : '#f7f1e6';
  const stroke = mode === 'cinema' ? '#16213a' : mode === 'punk' ? '#1a1a1a' : '#bfa886';
  const river  = mode === 'cinema' ? '#0a1628' : mode === 'punk' ? '#d8d4c4' : '#e8d9b8';
  const label  = mode === 'cinema' ? '#8a93a8' : mode === 'punk' ? '#4a4a4a' : '#9a7f54';

  // A simple polyline for the Thames meander through SE1
  const thames = 'M 40 180  C 200 140, 320 260, 480 220  S 780 300, 980 240';

  return (
    <div className="atlas-map" style={{ background: bg, position: 'relative' }}>
      <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" style={{ width: '100%', height: '100%', display: 'block' }}>
        {/* grid roads */}
        <g stroke={stroke} strokeWidth={mode === 'punk' ? 1.2 : 0.8} opacity={mode === 'cinema' ? 0.25 : 0.35}>
          {Array.from({length: 16}).map((_, i) => (
            <line key={'h'+i} x1={0} x2={1000} y1={i * 40} y2={i * 40} />
          ))}
          {Array.from({length: 25}).map((_, i) => (
            <line key={'v'+i} x1={i * 44} x2={i * 44} y1={0} y2={600} />
          ))}
        </g>
        {/* major avenues */}
        <g stroke={stroke} strokeWidth={mode === 'punk' ? 3.2 : 2.2} opacity={0.8}>
          <line x1={0}   y1={320} x2={1000} y2={260} />
          <line x1={260} y1={0}   x2={360}  y2={600} />
          <line x1={680} y1={0}   x2={580}  y2={600} />
        </g>
        {/* Thames */}
        <path d={thames} fill="none" stroke={river} strokeWidth={mode === 'punk' ? 28 : 36} strokeLinecap="round" />
        <path d={thames} fill="none" stroke={stroke} strokeWidth={0.6} opacity={0.35} strokeDasharray={mode === 'punk' ? '2 3' : '0'} />
        {/* Borough labels */}
        <g fontFamily="var(--f-mono)" fontSize={mode === 'cinema' ? 10 : 11} fill={label} letterSpacing="2">
          <text x={120} y={520} opacity={0.6}>BERMONDSEY</text>
          <text x={420} y={90}  opacity={0.6}>BOROUGH</text>
          <text x={760} y={140} opacity={0.6}>LAMBETH</text>
          <text x={860} y={520} opacity={0.5}>WALWORTH</text>
        </g>
      </svg>

      {/* Markers */}
      {STOPS.map(s => (
        <div
          key={s.n}
          className="atlas-marker"
          data-mode={mode}
          style={{
            position: 'absolute',
            left: `calc(${x(s.lng) / 10}% - 15px)`,
            top:  `calc(${y(s.lat) / 6}% - 15px)`,
            zIndex: selectedStop === s.n ? 20 : (hover === s.n ? 15 : 5),
            transform: selectedStop === s.n
              ? (mode === 'punk' ? 'rotate(-4deg) scale(1.25)' : 'scale(1.25)')
              : undefined,
            outline: selectedStop === s.n ? `2px solid var(--mode-accent)` : undefined,
            outlineOffset: selectedStop === s.n ? 3 : undefined,
          }}
          onClick={() => onPick(s.n)}
          onMouseEnter={() => setHover(s.n)}
          onMouseLeave={() => setHover(null)}
        >
          <span className="atlas-marker-n">{s.n}</span>
        </div>
      ))}

      {/* Hover preview card */}
      {hover && (() => {
        const s = STOPS.find(x => x.n === hover);
        return s ? (
          <div className="atlas-map-hover">
            <div className="mono-sm" style={{ opacity: 0.6 }}>STOP {s.n} · {s.code}</div>
            <div style={{ fontFamily: 'var(--mode-display-font)', fontSize: 18, marginTop: 4, lineHeight: 1.15 }}>{s.title}</div>
            <div className="mono-sm" style={{ marginTop: 4, opacity: 0.7 }}>{s.time} · {s.mood}</div>

      })()}

      {/* attribution */}
      <div className="atlas-attribution">© OpenStreetMap © CARTO</div>
    </div>
  );
}

            </div>
            <div className="mono-sm" style={{ marginTop: 6, opacity: 0.65 }}>4 STOPS · 2/4 READY · MODE: CINEMA</div>
            <div className="mono-sm" style={{ marginTop: 2, opacity: 0.55 }}>Last touched 3 months ago</div>
          </div>
        </div>

        <div style={{ marginTop: 56 }}>
          <div className="eyebrow" style={{ marginBottom: 12 }}>Activity</div>
          <div className="col" style={{ fontSize: 13 }}>
            {[
              ['2 MIN AGO',  'Postcard v3 rendered for Stop 05 · Waterloo Bridge'],
              ['14 MIN AGO', 'img2img done for Stop 01 · Borough Market'],
              ['1 HR AGO',   'Uploaded 12 assets to Assets pool'],
              ['YESTERDAY',  'Changed default mode from cinema → fashion'],
              ['2 DAYS AGO', 'Published: Brick Lane after rain'],
            ].map(([t, msg], i) => (
              <div key={i} className="row gap-24" style={{ padding: '10px 0', borderBottom: '1px dashed var(--rule)' }}>
                <span className="mono-sm" style={{ opacity: 0.55, width: 100 }}>{t}</span>
                <span>{msg}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {modal && <NewProjectModal onClose={() => setModal(false)} onCreate={onOpenWorkspace} />}
    </div>
  );
}

function NewProjectModal({ onClose, onCreate }) {
  const [title, setTitle] = React.useState('New walk');
  const [defaultMode, setDefaultMode] = React.useState('fashion');
  return (
    <>
      <div className="slideover-scrim" onClick={onClose} />
      <div style={{
        position: 'fixed', top: '50%', left: '50%',
        transform: 'translate(-50%, -50%)',
        width: 560, maxWidth: '92vw',
        background: 'var(--paper)', color: 'var(--ink)',
        border: '1px solid var(--ink)',
        zIndex: 102,
        padding: 28,
      }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>New project</div>
        <div style={{ fontFamily: 'var(--f-fashion)', fontStyle: 'italic', fontSize: 32, lineHeight: 1 }}>Start a walk.</div>

        <div className="col gap-16" style={{ marginTop: 24 }}>
          <div>

            <input value={title} onChange={e => setTitle(e.target.value)}
                   style={{ width: '100%', borderBottom: '1.5px solid var(--ink)', padding: '6px 0', fontSize: 18 }} />
          </div>
          <div>
            <div className="eyebrow" style={{ marginBottom: 6 }}>Default mode for readers</div>
            <ModePill mode={defaultMode} onMode={setDefaultMode} />

          <div>
            <div className="eyebrow" style={{ marginBottom: 6 }}>Postcode area</div>
            <div className="row gap-8">
              {['SE1', 'E1', 'N1', 'SW8', 'other'].map(c => (
                <button key={c} className={'chip ' + (c === 'SE1' ? 'chip-solid' : '')}>{c}</button>
              ))}
            </div>
          </div>
        </div>

        <div className="row gap-12" style={{ marginTop: 28, justifyContent: 'flex-end' }}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-solid" onClick={onCreate}>Create &amp; open workspace →</button>
        </div>
      </div>
    </>
  );
}

Object.assign(window, { ProjectsList });

</script>
  <script type="text/babel" data-src="src/app.jsx">
// app.jsx — Root SPA with hash router, OpenAI image generation, and key management

// OpenAI image generation helper
async function generateImage({ prompt, size = '1024x1024' }) {
  const key = sessionStorage.getItem('lc_openai_key') || window.__LC_OPENAI_KEY_DEFAULT;
  if (!key) throw new Error('NO_KEY');
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model: 'dall-e-3', prompt, size, n: 1, response_format: 'b64_json' })
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('HTTP ' + res.status + ': ' + err.slice(0, 300));
  }
  const data = await res.json();
  const b64 = data.data?.[0]?.b64_json;
  if (!b64) throw new Error('NO_IMAGE_IN_RESPONSE');
  return { url: 'data:image/png;base64,' + b64, revisedPrompt: data.data?.[0]?.revised_prompt };
}
window.LCGenerateImage = generateImage;

// Key modal for OpenAI API key input
function KeyPasteModal({ onClose, onUseDefault }) {
  const [key, setKey] = React.useState('');
  const handleSave = () => {
    if (key.trim()) {
      sessionStorage.setItem('lc_openai_key', key.trim());
    }
    onClose();
  };
  return (
    <>
      <div className="lc-key-modal-backdrop" onClick={onClose} />
      <div className="lc-key-modal">
        <div style={{ marginBottom: 16 }}>
          <h2 style={{ margin: '0 0 8px 0', fontSize: 16, fontWeight: 500 }}>OpenAI API Key</h2>
          <p style={{ margin: '0 0 12px 0', fontSize: 13, opacity: 0.7, lineHeight: 1.5 }}>
            Your key is stored only in this tab's sessionStorage. Never embed a production key in a shared file.
          </p>
        </div>
        <input
          type="password"
          placeholder="sk-proj-..."
          value={key}
          onChange={(e) => setKey(e.target.value)}
          style={{
            width: '100%',
            padding: '8px 12px',
            border: '1px solid #ccc',
            borderRadius: 4,
            fontFamily: 'monospace',
            fontSize: 12,
            marginBottom: 12,
            boxSizing: 'border-box'
          }}
        />
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn" onClick={handleSave} style={{ flex: 1 }}>Save & use</button>
          <button className="btn" onClick={onUseDefault} style={{ flex: 1 }}>Use embedded default</button>
          <button className="btn" onClick={onClose} style={{ flex: 1 }}>Cancel</button>
        </div>
      </div>
    </>
  );
}

// Hero slot with image generation button
function HeroSlotWithGen({ stop, mode }) {
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [showKeyModal, setShowKeyModal] = React.useState(false);

  const handleGenerate = async () => {
    setLoading(true);
    setError(null);
    try {
      const prompt = `Photograph of ${stop.title} in London SE1. ${stop.mood} mood, ${stop.time} time of day, cinematic composition, editorial style.`;
      const result = await window.LCGenerateImage({ prompt });
      // Store in LC store (assuming storeActions has setGeneratedImage)
      if (window.storeActions?.setGeneratedImage) {
        window.storeActions.setGeneratedImage(stop.n, { url: result.url, prompt, revisedPrompt: result.revisedPrompt });
      }
      setLoading(false);
    } catch (err) {
      setError(err.message);
      setLoading(false);
      if (err.message.includes('NO_KEY')) {
        setShowKeyModal(true);
      }
    }
  };

  if (!stop.status.hero) {
    return (
      <div style={{ position: 'relative', display: 'grid', placeItems: 'center', borderStyle: 'dashed', minHeight: 280 }}>
        {loading && <div className="lc-gen-loading">Generating...</div>}
        {error && <div className="lc-gen-error">{error}</div>}
        {!loading && !error && (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
            <div className="mono-sm" style={{ opacity: 0.65 }}>Pick a hero from the asset strip</div>
            <button className="btn btn-sm" onClick={handleGenerate}>⚡ Generate with AI</button>
            <button className="btn btn-sm" style={{ opacity: 0.6 }}>Drop image here</button>
          </div>
        )}
        {showKeyModal && (
          <KeyPasteModal 
            onClose={() => setShowKeyModal(false)}
            onUseDefault={() => setShowKeyModal(false)}
          />
        )}
      </div>
    );
  }
  
  // Hero exists; show with generate button overlay
  return (
    <div style={{ position: 'relative', display: 'inline-block', width: '100%' }}>
      <Img label={stop.label + ' · HERO'} tone={stop.tone} ratio="16/9" style={{ aspectRatio: 'auto', height: mode === 'cinema' ? 360 : 440, width: '100%' }} />
      <button className="lc-gen-button" onClick={handleGenerate} title="Generate new image">⚡</button>
      {loading && <div className="lc-gen-loading">Generating...</div>}
      {error && <div className="lc-gen-error">{error}</div>}
      {showKeyModal && (
        <KeyPasteModal 
          onClose={() => setShowKeyModal(false)}
          onUseDefault={() => setShowKeyModal(false)}
        />
      )}
    </div>
  );
}

// Hash router
function App() {
  const [hash, setHash] = React.useState(location.hash);
  const [showPublish, setShowPublish] = React.useState(false);
  const [showKeyModal, setShowKeyModal] = React.useState(false);
  const mode = window.useLCStore ? window.useLCStore(s => s.ui?.mode || s.project?.defaultMode || 'fashion') : 'fashion';

  // Listen to hash changes
  React.useEffect(() => {
    const handleHashChange = () => setHash(location.hash);
    window.addEventListener('hashchange', handleHashChange);
    return () => window.removeEventListener('hashchange', handleHashChange);
  }, []);

  // Update body data-mode
  React.useEffect(() => {
    document.body.setAttribute('data-mode', mode);
  }, [mode]);

  // Route parsing
  const route = hash.slice(1) || 'projects';
  const [screen, ...params] = route.split('/');

  // Handler helpers
  const handleExitToProjects = () => {
    location.hash = '#projects';
    setShowPublish(false);
  };
  const handleOpenPublish = () => {
    setShowPublish(true);
  };
  const handleClosePublish = () => {
    setShowPublish(false);
  };
  const handleChangeMode = (newMode) => {
    if (window.storeActions?.setMode) {
      window.storeActions.setMode(newMode);
    }
  };

  // Render based on route
  let content;
  if (screen === 'projects') {
    content = window.ProjectsList ? <ProjectsList onSelectProject={() => location.hash = '#workspace'} /> : <div>Loading ProjectsList...</div>;
  } else if (screen === 'workspace') {
    content = window.Workspace ? (
      <div>
        <Workspace 
          mode={mode}
          onMode={handleChangeMode}
          onOpenPublish={handleOpenPublish}
          onExitToProjects={handleExitToProjects}
        />
        {showPublish && window.PublishSlideover && (
          <PublishSlideover mode={mode} onClose={handleClosePublish} />
        )}
      </div>
    ) : <div>Loading Workspace...</div>;
  } else if (screen === 'public') {
    // Default to PublicProject (MapLibre-powered). #public/atlas for standalone Atlas.
    const publicMode = params[0] || 'project';
    content = publicMode === 'atlas' && window.Atlas ? (
      <Atlas mode={mode} onMode={handleChangeMode} />
    ) : window.PublicProject ? (
      <PublicProject mode={mode} onMode={handleChangeMode} onExit={handleExitToProjects} onStopClick={(stop) => location.hash = '#postcard/' + (stop.n || stop)} />
    ) : <div>Loading Public view...</div>;
  } else if (screen === 'postcard') {
    const stopId = params[0] || '05';
    content = window.PostcardEditor ? <PostcardEditor stopId={stopId} /> : <div>Loading PostcardEditor...</div>;
  } else {
    // Default: go to projects
    location.hash = '#projects';
    content = <div>Redirecting...</div>;
  }

  return (
    <div style={{ width: '100%', height: '100%' }}>
      {content}
    </div>
  );
}

Object.assign(window, { App, HeroSlotWithGen, KeyPasteModal });

</script>

  <!-- Render app -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
