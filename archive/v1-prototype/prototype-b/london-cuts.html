function MediaPanel({ onNav, mode, onMode }) {
  const provider = getMediaProvider();
  const tasks = useStore(s => s.mediaTasks);
  const stops = useStore(s => s.stops);
  const [selectedId, setSelectedId] = React.useState(null);
  const [filter, setFilter] = React.useState('all'); // all|running|done|failed|queued

  // Pick a sensible default selection: freshest done, else freshest anything
  React.useEffect(() => {
    if (selectedId && tasks.some(t => t.id === selectedId)) return;
    const done = tasks.find(t => t.state === 'done');
    setSelectedId((done || tasks[0])?.id || null);
  }, [tasks, selectedId]);

  const filtered = React.useMemo(() => {
    return tasks.filter(t => filter === 'all' ? true : t.state === filter);
  }, [tasks, filter]);

  const selected = tasks.find(t => t.id === selectedId) || null;
  const savedResults = tasks.filter(t => t.state === 'done');
  const running = tasks.filter(t => t.state === 'running' || t.state === 'queued').length;

  const startTask = async (kind) => {
    const stop = stops[Math.floor(Math.random() * stops.length)];
    const createFn = kind === 'img2vid'
      ? provider.createImageToVideoJob.bind(provider)
      : provider.createImageToImageJob.bind(provider);
    const { taskId } = await createFn({
      stopId: stop.n,
      sourceAssetId: stop.heroAssetId || null,
      mode,
      prompt: kind === 'img2vid' ? 'animate 2–4s, hold composition' : 'restyle in ' + mode + ' grammar',
    });
    setSelectedId(taskId);
  };

  const cancelQueued = async () => {
    const queued = tasks.filter(t => t.state === 'queued' || t.state === 'running');
    for (const t of queued) await provider.cancelJob(t.id);
  };

  return (
    <StudioShell
      screen="media" onNav={onNav} mode={mode} onMode={onMode}
      title="Media integration panel"
      breadcrumb="A Year in SE1 › Media"
      actions={<>
        <button className="btn" onClick={cancelQueued} disabled={running === 0}>Cancel queued</button>
        <button className="btn btn-solid" onClick={() => startTask('img2img')}>+ New task</button>
      </>}
    >
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 360px', gap: 24 }}>
        <div>
          {/* Entry points — the only place generators are invoked */}
          <div style={{ border: '1px solid var(--rule)', padding: 20, marginBottom: 24 }}>
            <div className="row between items-baseline" style={{ marginBottom: 16 }}>
              <div>
                <div style={{ fontFamily: 'var(--f-serif)', fontSize: 24 }}>Start a media task</div>
                <div className="mono-sm" style={{ opacity: 0.6, marginTop: 4 }}>Hands off to the media provider. We track the job and save results back to the stop.</div>
              </div>
              <div className="chip" title="Swap via setMediaProvider(...). See src/media-provider.jsx.">
                Provider: {provider.id} · {provider.id === 'mock' ? 'mock (local)' : 'live'}
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {[
                { t: 'Image → Image', s: 'Restyle a source frame in mode grammar', b: 'Start image-to-image →', kind: 'img2img' },
                { t: 'Image → Video', s: 'Animate a stop into a 2–4s clip', b: 'Start image-to-video →', kind: 'img2vid' },
              ].map(k => (
                <div key={k.t} style={{ padding: 16, border: '1.5px solid var(--rule)', background: 'var(--paper-2)' }}>
                  <div className="mono-sm" style={{ opacity: 0.6 }}>HANDOFF</div>
                  <div style={{ fontFamily: 'var(--f-serif)', fontSize: 22, marginTop: 4 }}>{k.t}</div>
                  <div style={{ fontSize: 13, opacity: 0.8, margin: '4px 0 14px' }}>{k.s}</div>
                  <button className="btn btn-sm btn-solid" onClick={() => startTask(k.kind)}>{k.b}</button>
                </div>
              ))}
            </div>
          </div>

          {/* Task queue */}
          <div className="row between items-baseline" style={{ marginBottom: 12 }}>
            <div style={{ fontFamily: 'var(--f-serif)', fontSize: 22 }}>Tasks · {tasks.length}</div>
            <div className="row gap-8">
              {['all', 'running', 'queued', 'done', 'failed'].map(f => (
                <button key={f}
                  onClick={() => setFilter(f)}
                  className="mono-sm"
                  style={{
                    padding: '4px 10px',
                    border: `1px solid ${filter === f ? 'var(--ink)' : 'var(--rule)'}`,
                    background: filter === f ? 'var(--ink)' : 'transparent',
                    color: filter === f ? 'var(--paper)' : 'var(--ink)',
                  }}
                >{f}</button>
              ))}
            </div>
          </div>

          <div style={{ border: '1px solid var(--rule)' }}>
            {filtered.length === 0 && (
              <div style={{ padding: '24px 14px', textAlign: 'center', opacity: 0.55 }} className="mono-sm">No tasks matching this filter. Try "all".</div>
            )}
            {filtered.map((t) => {
              const color = t.state === 'done' ? 'oklch(0.55 0.14 140)'
                : t.state === 'running' ? 'oklch(0.6 0.18 240)'
                : t.state === 'failed' ? 'oklch(0.55 0.2 25)'
                : t.state === 'cancelled' ? 'oklch(0.55 0.01 60)'
                : 'oklch(0.6 0 0)';
              const pct = Math.round((t.progress || 0) * 100);
              const stopMeta = stops.find(s => s.n === t.stopId);
              const label = `${t.stopId} · ${stopMeta?.title || 'stop'} · ${t.mode}`;
              const eta = t.state === 'done' ? ((t.durationMs || 0) / 1000).toFixed(1) + 's'
                : t.state === 'running' ? Math.max(0, Math.round((t.etaMs || 0) / 1000)) + 's'
                : t.state === 'queued' ? 'queued'
                : t.state === 'failed' ? 'retry'
                : t.state;
              const active = t.id === selectedId;
              return (
                <div key={t.id}
                  onClick={() => setSelectedId(t.id)}
                  className="row items-center gap-16"
                  style={{
                    padding: '12px 14px', borderBottom: '1px solid var(--rule)',
                    background: active ? 'var(--paper-2)' : 'transparent',
                    borderLeft: active ? '3px solid var(--ink)' : '3px solid transparent',
                    cursor: 'pointer',
                  }}>
                  <div style={{ width: 56, height: 40 }}>
                    <Img label="" tone={t.kind === 'img2vid' ? 'dark' : t.mode === 'punk' ? 'punk' : t.mode === 'cinema' ? 'cool' : 'warm'} ratio="16/10" />
                  </div>
                  <div className="mono-sm" style={{ width: 80, opacity: 0.6 }}>{t.kind.toUpperCase()}</div>
                  <div style={{ flex: 1, fontSize: 13 }}>{label}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ height: 4, background: 'var(--paper-3)' }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: color, transition: 'width 300ms' }} />
                    </div>
                  </div>
                  <div className="mono-sm" style={{ width: 80, textAlign: 'right', color }}>{t.state.toUpperCase()}</div>
                  <div className="mono-sm" style={{ width: 60, textAlign: 'right', opacity: 0.5 }}>{eta}</div>
                  <div className="row gap-4">
                    <button className="btn btn-sm" title="Retry"
                      onClick={(e) => { e.stopPropagation(); provider.retryJob(t.id); }}
                      disabled={t.state === 'running' || t.state === 'queued'}>↺</button>
                    <button className="btn btn-sm" title="Cancel"
                      onClick={(e) => { e.stopPropagation(); provider.cancelJob(t.id); }}
                      disabled={t.state !== 'running' && t.state !== 'queued'}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Results gallery */}
          <div style={{ marginTop: 32 }}>
            <div className="row between items-baseline" style={{ marginBottom: 12 }}>
              <div style={{ fontFamily: 'var(--f-serif)', fontSize: 22 }}>Saved results · {savedResults.length}</div>
              <div className="mono-sm" style={{ opacity: 0.6 }}>Click to inspect · drag-to-editor TODO</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
              {savedResults.length === 0 && (
                <div className="mono-sm" style={{ gridColumn: '1 / -1', padding: '20px 0', opacity: 0.5 }}>No saved results yet. Start a task above.</div>
              )}
              {savedResults.map((t) => (
                <div key={t.id} onClick={() => setSelectedId(t.id)} style={{ position: 'relative', cursor: 'pointer', outline: t.id === selectedId ? '2px solid var(--ink)' : 'none' }}>
                  <Img label={t.kind === 'img2vid' ? 'IMG2VID' : 'IMG2IMG'} tone={t.kind === 'img2vid' ? 'dark' : t.mode === 'punk' ? 'punk' : t.mode === 'cinema' ? 'cool' : 'warm'} ratio="1/1" />
                  {t.kind === 'img2vid' && <div style={{ position: 'absolute', bottom: 6, right: 6, background: 'rgba(0,0,0,0.7)', color: 'white', padding: '2px 6px', fontFamily: 'var(--f-mono)', fontSize: 9 }}>▶ {((t.durationMs || 3200) / 1000).toFixed(1)}s</div>}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Sidebar — selected task inspector */}
        <div className="col gap-20">
          <div style={{ padding: 20, border: '1px solid var(--rule)' }}>
            <div className="row between items-center">
              <div className="eyebrow">Selected task</div>
              <div className="chip" style={{
                color: selected?.state === 'done' ? 'oklch(0.55 0.14 140)' : selected?.state === 'failed' ? 'oklch(0.55 0.2 25)' : 'inherit',
                borderColor: selected?.state === 'done' ? 'oklch(0.55 0.14 140)' : selected?.state === 'failed' ? 'oklch(0.55 0.2 25)' : 'currentColor',
              }}>{selected ? selected.state : '—'}</div>
            </div>
            <div style={{ fontFamily: 'var(--f-serif)', fontSize: 20, marginTop: 10 }}>
              {selected ? (selected.kind === 'img2vid' ? 'Image → Video' : 'Image → Image') : 'No task selected'}
            </div>
            <div className="mono-sm" style={{ opacity: 0.6 }}>
              {selected ? `Stop ${selected.stopId} · ${stops.find(s => s.n === selected.stopId)?.title || ''}` : 'Pick a task from the list.'}
            </div>

            <div style={{ marginTop: 14, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <div>
                <div className="mono-sm" style={{ opacity: 0.5, marginBottom: 4 }}>SOURCE</div>
                <Img label="" tone={selected?.mode === 'cinema' ? 'cool' : 'warm'} ratio="1/1" />
              </div>
              <div>
                <div className="mono-sm" style={{ opacity: 0.5, marginBottom: 4 }}>RESULT</div>
                <Img label={selected?.state === 'running' ? '…' : ''} tone={selected?.state === 'done' ? (selected.mode === 'punk' ? 'punk' : 'warm') : 'dark'} ratio="1/1" />
              </div>
            </div>

            {selected?.state === 'running' && (
              <div style={{ marginTop: 12 }}>
                <div style={{ height: 4, background: 'var(--paper-3)' }}>
                  <div style={{ height: '100%', width: `${Math.round((selected.progress || 0) * 100)}%`, background: 'oklch(0.6 0.18 240)', transition: 'width 300ms' }} />
                </div>
                <div className="mono-sm" style={{ marginTop: 6, opacity: 0.7 }}>
                  {Math.round((selected.progress || 0) * 100)}% · eta {Math.max(0, Math.round((selected.etaMs || 0) / 1000))}s
                </div>
              </div>
            )}

            <div className="rule" style={{ margin: '16px 0' }} />
            <div className="col gap-8" style={{ fontSize: 12 }}>
              {selected ? [
                ['Provider', selected.providerId],
                ['Mode', selected.mode],
                ['Prompt', `"${selected.prompt || '—'}"`],
                ['Strength', String(selected.strength ?? '—')],
                ['Seed', String(selected.seed ?? '—')],
                ['Progress', `${Math.round((selected.progress || 0) * 100)}%`],
                ['Duration', selected.durationMs ? (selected.durationMs / 1000).toFixed(2) + 's' : '—'],
              ].map(([k, v]) => (
                <div key={k} className="row between gap-12">
                  <span className="mono-sm" style={{ opacity: 0.55, minWidth: 70 }}>{k}</span>
                  <span style={{ textAlign: 'right' }}>{v}</span>
                </div>
              )) : <div className="mono-sm" style={{ opacity: 0.55 }}>—</div>}
            </div>
            <div className="row gap-8" style={{ marginTop: 16 }}>
              <button className="btn btn-sm btn-solid"
                disabled={!selected || selected.state !== 'done'}
                onClick={() => onNav('editor')}>Use in editor</button>
              <button className="btn btn-sm"
                disabled={!selected}
                onClick={() => selected && provider.retryJob(selected.id)}>Regenerate</button>
              <button className="btn btn-sm"
                disabled={!selected || selected.state !== 'done'}
                onClick={() => selected && exportPostcardPNG({ mode: selected.mode, side: 'front', filename: `london-cuts-result-${selected.id}.png` })}
              >Download</button>
            </div>
          </div>

          <div style={{ padding: 16, border: '1px solid var(--rule)', background: 'var(--paper-2)' }}>
            <div className="eyebrow" style={{ marginBottom: 8 }}>Quota · mock</div>
            <div className="mono-sm" style={{ opacity: 0.7 }}>{tasks.length * 4} / 500 credits used</div>
            <div style={{ height: 4, background: 'var(--paper-3)', marginTop: 8 }}>
              <div style={{ height: '100%', width: `${Math.min(100, tasks.length * 4 / 5)}%`, background: 'var(--ink)' }} />
            </div>
          </div>
        </div>
      </div>
    </StudioShell>
  );
}

              <div style={{ fontFamily: pubMode === 'punk' ? 'var(--f-display)' : pubMode === 'cinema' ? 'var(--f-serif)' : 'var(--f-fashion)', fontSize: 48, lineHeight: 1, marginTop: 12, fontStyle: pubMode === 'fashion' ? 'italic' : 'normal', textTransform: pubMode === 'punk' ? 'uppercase' : 'none' }}>A Year in SE1</div>

Object.assign(window, { StoryEditor, MediaPanel, Publish });

</script>
<script type="text/babel">
// === inlined: src/workspace.jsx ===
// workspace.jsx — Unified workspace shell for screens 08–12 (Upload, Organize, Editor, Media, Publish)
//
// New 5-screen IA: Landing, Public (02+03+04), Postcard, Projects (06+07), Workspace (08+09+10+11+12)
//
// Layout:
// ┌─────────────────────────────────────────────────┐
// │ Top bar: mode switch | title | Publish button   │
// ├──────┬──────────────────────────────┬──────────────┤
// │      │                              │   Assets     │
// │Spine │    Main canvas               │   pool (A)   │
// │(10)  │                              ├──────────────┤
// │stops │                              │   Media      │
// │      │                              │   queue (B)  │
// └──────┴──────────────────────────────┴──────────────┘
//
// Responsive: <= 1280 → right drawers become bottom sheets; <= 768 → left spine becomes top strip

function Workspace({ mode, onMode, onNav }) {
  const [activeStop, setActiveStop] = React.useState(STOPS[0]?.n || '01');
  const [rightDrawerOpen, setRightDrawerOpen] = React.useState(false);
  const [publishOpen, setPublishOpen] = React.useState(false);
  const state = useStore();
  const project = state.project || {};
  const stops = state.stops || [];
  const assets = state.assets || [];
  const assetsPool = state.assetsPool || [];
  const mediaTasks = state.mediaTasks || [];

  const activeSt = stops.find(s => s.n === activeStop);
  const poolAssets = assets.filter(a => assetsPool.includes(a.id));

  // Get stop data by ID
  const getStop = (n) => stops.find(s => s.n === n);

  // TODO: Add project title editor — would need a new store action setProjectTitle or local state + manual persist
  // TODO: Add mode sync to store if a setMode action exists in storeActions

  return (
    <div className="workspace" data-mode={mode}>
      {/* Top bar */}
      <div className="workspace-topbar">
        <div className="workspace-topbar-left">
          <ModeSwitcher mode={mode} onMode={onMode} />
        </div>
        <div className="workspace-topbar-center">
          <h1 className="workspace-title" contentEditable suppressContentEditableWarning title="Click to edit project title">
            {project.title || 'Untitled Project'}
          </h1>
        </div>
        <div className="workspace-topbar-right">
          <button className="btn workspace-publish-btn" onClick={() => setPublishOpen(true)}>
            PUBLISH
          </button>
        </div>
      </div>

      {/* Main layout grid */}
      <div className="workspace-grid">
        {/* Left spine: stop list */}
        <div className="workspace-spine">
          <div className="workspace-spine-list">
            {stops.map(st => {
              const isActive = st.n === activeStop;
              // Progress strip: 4 pips for [hero, uploads, body, postcard]
              const heroOk = \!\!st.heroAssetId;
              const assetsOk = (st.assetIds?.length || 0) > 0;
              const bodyOk = st.body?.content?.length > 0;
              const postcardOk = \!\!st.message; // simplified: if message is set
              const progress = [heroOk, assetsOk, bodyOk, postcardOk];

              return (
                <div
                  key={st.n}
                  className="workspace-spine-row"
                  data-active={isActive}
                  onClick={() => setActiveStop(st.n)}
                >
                  <div className="workspace-spine-badge">{st.n}</div>
                  <div className="workspace-spine-info">
                    <div className="workspace-spine-title">{st.title}</div>
                    <div className="workspace-spine-code">{st.code}</div>
                  </div>
                  <div className="workspace-spine-progress">
                    {progress.map((done, i) => (
                      <span key={i} className="progress-pip" data-done={done} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Main canvas */}
        <div className="workspace-canvas">
          {activeSt ? (
            <div className="workspace-sections">
              {/* 1. Hero image slot */}
              <section className="workspace-section hero-section">
                <h3 className="section-label">Hero image</h3>
                {activeSt.heroAssetId ? (
                  <div className="workspace-hero-display">
                    <div className="img-ph" data-tone={activeSt.tone} data-label={activeSt.label} style={{ height: 300 }} />
                    <button className="btn-sm" onClick={() => storeActions.setHero(activeSt.n, null)}>Change</button>
                  </div>
                ) : (
                  <div className="workspace-hero-placeholder">
                    <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--ink-3)' }}>
                      <div className="mono" style={{ marginBottom: 10 }}>No hero assigned</div>
                      <div style={{ fontSize: '14px', marginBottom: 20 }}>Drag an asset from the pool or upload a new image</div>
                      {/* TODO: DnD target area for hero assignment */}
                    </div>
                  </div>
                )}
              </section>

              {/* 2. Upload / drag-drop zone */}
              <section className="workspace-section upload-section">
                <h3 className="section-label">Upload assets</h3>
                <div className="workspace-dropzone">
                  <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--ink-3)' }}>
                    <div className="mono" style={{ marginBottom: 10 }}>DRAG FILES HERE</div>
                    <div style={{ fontSize: '14px' }}>or click to browse</div>
                    {/* TODO: Implement file upload + preview */}
                  </div>
                </div>
              </section>

              {/* 3. Asset strip (stop-specific) */}
              <section className="workspace-section assets-section">
                <h3 className="section-label">Assets ({activeSt.assetIds?.length || 0})</h3>
                {(activeSt.assetIds?.length || 0) > 0 ? (
                  <div className="workspace-asset-strip">
                    {activeSt.assetIds?.map(assetId => {
                      const asset = assets.find(a => a.id === assetId);
                      return (
                        <div key={assetId} className="asset-thumb">
                          <div className="img-ph" style={{ height: 60, width: 60 }} />
                          {/* TODO: Click to inspect, drag to reorder */}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{ padding: '20px', color: 'var(--ink-3)', textAlign: 'center' }}>
                    <span className="mono-sm">No assets yet</span>
                  </div>
                )}
              </section>

              {/* 4. Body text region */}
              <section className="workspace-section body-section">
                <h3 className="section-label">Story text</h3>
                <div className="workspace-body">
                  {activeSt.body?.content?.length > 0 ? (
                    <div className="workspace-body-display">{JSON.stringify(activeSt.body)}</div>
                  ) : (
                    <div className="workspace-body-placeholder">Write here…</div>
                  )}
                  {/* TODO: Implement contenteditable or TipTap editor */}
                </div>
              </section>

              {/* 5. Postcard preview */}
              <section className="workspace-section postcard-preview-section">
                <h3 className="section-label">Postcard preview</h3>
                <div className="workspace-postcard-preview">
                  {/* TODO: Render Postcard component in view mode for this stop */}
                  <div style={{ padding: '40px', background: 'var(--paper-2)', textAlign: 'center', color: 'var(--ink-3)' }}>
                    <div className="mono-sm" style={{ marginBottom: 10 }}>Postcard for stop {activeSt.n}</div>
                    <div style={{ fontSize: '12px' }}>Message: {activeSt.message?.substring(0, 40) || '(empty)'}…</div>
                  </div>
                </div>
              </section>
            </div>
          ) : (
            <div style={{ padding: '40px', textAlign: 'center', color: 'var(--ink-3)' }}>
              No stop selected
            </div>
          )}
        </div>

        {/* Right drawers (collapsible) */}
        <div className="workspace-right-rail">
          {/* Drawer A: Assets pool */}
          <div className="workspace-drawer assets-pool-drawer">
            <div className="workspace-drawer-header">
              <h3 className="section-label">Assets pool</h3>
            </div>
            <div className="workspace-drawer-content">
              {poolAssets.length > 0 ? (
                <div className="assets-pool-list">
                  {poolAssets.map(asset => (
                    <div key={asset.id} className="pool-asset-row" title={asset.name}>
                      <div className="pool-asset-thumb">
                        <div className="img-ph" style={{ height: 40, width: 40 }} />
                      </div>
                      <div className="pool-asset-meta">
                        <div className="mono-sm">{asset.name?.substring(0, 20)}</div>
                        {/* TODO: Drag to assign to current stop */}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ padding: '20px', textAlign: 'center', color: 'var(--ink-3)' }}>
                  <div className="mono-sm">Drop files here</div>
                </div>
              )}
            </div>
          </div>

          {/* Drawer B: Media queue */}
          <div className="workspace-drawer media-queue-drawer">
            <div className="workspace-drawer-header">
              <h3 className="section-label">Media queue</h3>
            </div>
            <div className="workspace-drawer-content">
              {mediaTasks.length > 0 ? (
                <div className="media-tasks-list">
                  {mediaTasks.map(task => (
                    <div key={task.id} className="media-task-row">
                      <div className="media-task-status" data-state={task.state}>
                        <span className="mono-sm">{task.state || 'queued'}</span>
                      </div>
                      <div className="media-task-meta">
                        <div style={{ fontSize: '12px' }}>Stop {task.stop_id}</div>
                        <div className="mono-sm" style={{ opacity: 0.6 }}>{task.kind}</div>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ padding: '20px', textAlign: 'center', color: 'var(--ink-3)' }}>
                  <div className="mono-sm">No tasks</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Publish slide-over */}
      {publishOpen && (
        <PublishSlideOver
          project={project}
          stops={stops}
          onClose={() => setPublishOpen(false)}
          onNav={onNav}
        />
      )}
    </div>
  );
}

// ———————————— Publish slide-over ————————————
function PublishSlideOver({ project, stops, onClose, onNav }) {
  const [slug, setSlug] = React.useState(project.slug || '');
  const [visibility, setVisibility] = React.useState(project.visibility || 'public');

  // Pre-flight checks
  const missingHeroes = stops.filter(s => \!s.heroAssetId).length;
  const missingText = stops.filter(s => \!s.body?.content?.length).length;

  return (
    <>
      {/* Backdrop */}
      <div className="publish-backdrop" onClick={onClose} />

      {/* Panel */}
      <div className="publish-panel">
        <div className="publish-header">
          <h2 className="section-label">Publish</h2>
          <button className="publish-close" onClick={onClose}>✕</button>
        </div>

        <div className="publish-content">
          {/* Pre-flight checklist */}
          <div className="publish-section">
            <h3 className="eyebrow">Pre-flight</h3>
            <div className="checklist">
              <div className="checklist-row" data-ok={missingHeroes === 0}>
                <span className="checklist-icon">{missingHeroes === 0 ? '✓' : '⚠'}</span>
                <span>Heroes: {missingHeroes === 0 ? 'All stops set' : `${missingHeroes} missing`}</span>
              </div>
              <div className="checklist-row" data-ok={missingText === 0}>
                <span className="checklist-icon">{missingText === 0 ? '✓' : '⚠'}</span>
                <span>Text: {missingText === 0 ? 'All stops written' : `${missingText} missing`}</span>
              </div>
            </div>
          </div>

          {/* Slug editor */}
          <div className="publish-section">
            <label className="eyebrow">URL slug</label>
            <input
              type="text"
              className="publish-slug-input"
              value={slug}
              onChange={(e) => setSlug(e.target.value)}
              placeholder="my-project"
            />
          </div>

          {/* Visibility toggle */}
          <div className="publish-section">
            <label className="eyebrow">Visibility</label>
            <div className="visibility-options">
              {['public', 'unlisted', 'private'].map(v => (
                <label key={v} className="visibility-option">
                  <input
                    type="radio"
                    name="visibility"
                    value={v}
                    checked={visibility === v}
                    onChange={(e) => setVisibility(e.target.value)}
                  />
                  <span className="mono">{v}</span>
                </label>
              ))}
            </div>
          </div>

          {/* Share affordances */}
          <div className="publish-section">
            <h3 className="eyebrow">Share</h3>
            <div className="publish-buttons">
              <button className="btn" onClick={() => {
                // TODO: Actual URL generation
                const url = `https://london-cuts.example/@${project.author}/${slug}`;
                navigator.clipboard.writeText(url);
                alert('Copied to clipboard\!');
              }}>
                COPY LINK
              </button>
              <button className="btn" onClick={() => onNav('public')}>
                VIEW PUBLIC
              </button>
            </div>
          </div>

          {/* Live preview placeholder */}
          <div className="publish-section">
            <h3 className="eyebrow">Preview</h3>
            <div className="publish-preview">
              <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--ink-3)' }}>
                <div className="mono-sm">Live preview</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ———————————— Mode switcher component ————————————
function ModeSwitcher({ mode, onMode }) {
  return (
    <div className="mode-switcher" role="radiogroup">
      {['punk', 'fashion', 'cinema'].map(m => (
        <button
          key={m}
          className="mode-pill"
          data-active={mode === m}
          onClick={() => onMode(m)}
          aria-checked={mode === m}
          title={`Switch to ${m} mode`}
        >
          <span className="mode-label">{m}</span>
        </button>
      ))}
    </div>
  );
}

Object.assign(window, { Workspace });

</script>

<script type="text/babel">
// ————————————————————————————————————————————————————
// V2 Router: 5-screen IA
// ————————————————————————————————————————————————————

const SCREENS_V2 = [
  { id: 'landing',  label: 'Landing',     Comp: Landing,        surface: 'public' },
  { id: 'public',   label: 'Public',      Comp: PublicProject,  surface: 'public' },
  { id: 'postcard', label: 'Postcard',    Comp: Postcard,       surface: 'public' },
  { id: 'projects', label: 'Projects',    Comp: StudioDashboard, surface: 'studio' },
  { id: 'workspace', label: 'Workspace',  Comp: Workspace,      surface: 'studio' },
];

// Legacy screens for power-user menu (01–12)
const SCREENS_LEGACY = [
  { id: 'landing',         label: '01 · Landing',      Comp: Landing,         surface: 'public' },
  { id: 'public-project',  label: '02 · Public project', Comp: PublicProject, surface: 'public' },
  { id: 'atlas',           label: '03 · Atlas',        Comp: Atlas,           surface: 'public' },
  { id: 'stop',            label: '04 · Stop',         Comp: Stop,            surface: 'public' },
  { id: 'postcard',        label: '05 · Postcard',     Comp: Postcard,        surface: 'public' },
  { id: 'studio',          label: '06 · Studio dashboard', Comp: StudioDashboard, surface: 'studio' },
  { id: 'create',          label: '07 · Create project', Comp: CreateProject, surface: 'studio' },
  { id: 'upload',          label: '08 · Upload memories', Comp: UploadMemories, surface: 'studio' },
  { id: 'organize',        label: '09 · Organize stops', Comp: OrganizeStops, surface: 'studio' },
  { id: 'editor',          label: '10 · Story editor', Comp: StoryEditor,     surface: 'studio' },
  { id: 'media',           label: '11 · Media panel',  Comp: MediaPanel,      surface: 'studio' },
  { id: 'publish',         label: '12 · Publish',      Comp: Publish,         surface: 'studio' },
];

// Hash-route aliasing for V1 → V2 migration
function mapLegacyHash(hash) {
  // Handle old hashes and redirect to new ones
  if (hash === 'public-project') return 'public';
  if (hash === 'upload' || hash === 'organize' || hash === 'editor' || hash === 'media' || hash === 'publish') return 'workspace';
  if (hash === 'studio' || hash === 'create') return 'projects';
  if (hash === 'atlas' || hash === 'stop') return 'public'; // Keep in public surface for now
  return hash;
}

function App() {
  const [screen, setScreen] = React.useState(() => {
    let h = location.hash.replace('#', '');
    // Support V2 routes and legacy routes
    h = mapLegacyHash(h);
    return SCREENS_V2.find(s => s.id === h)?.id || 'landing';
  });
  const [mode, setMode] = React.useState(() => localStorage.getItem('lc_mode') || 'fashion');
  const [dockOpen, setDockOpen] = React.useState(false);
  const [powerUserOpen, setPowerUserOpen] = React.useState(false);

  React.useEffect(() => {
    location.hash = screen;
    localStorage.setItem('lc_screen', screen);
  }, [screen]);
  React.useEffect(() => { localStorage.setItem('lc_mode', mode); }, [mode]);

  // Close on Esc + on click outside the dock
  React.useEffect(() => {
    if (\!dockOpen && \!powerUserOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') { setDockOpen(false); setPowerUserOpen(false); } };
    const onClick = (e) => {
      if (\!e.target.closest || \!e.target.closest('.app-dock')) {
        setDockOpen(false);
        setPowerUserOpen(false);
      }
    };
    window.addEventListener('keydown', onKey);
    window.addEventListener('mousedown', onClick);
    return () => {
      window.removeEventListener('keydown', onKey);
      window.removeEventListener('mousedown', onClick);
    };
  }, [dockOpen, powerUserOpen]);

  const cur = SCREENS_V2.find(s => s.id === screen);
  const Comp = cur?.Comp || Landing;
  const pick = (id) => { setScreen(id); setDockOpen(false); setPowerUserOpen(false); };
  const pickLegacy = (id) => {
    // Map legacy ID back to V2 if needed, or render directly
    const mapped = mapLegacyHash(id);
    setScreen(mapped);
    setDockOpen(false);
    setPowerUserOpen(false);
  };

  return (
    <div data-screen-label={cur?.label}>
      <Comp mode={mode} onMode={setMode} onNav={setScreen} />

      <div className="app-dock" data-open={dockOpen} data-power-user={powerUserOpen}>
        {/* Main V2 toolbar (5 screens) */}
        <div className="app-toolbar">
          {SCREENS_V2.map(s => (
            <button key={s.id} data-active={screen === s.id} onClick={() => pick(s.id)} title={s.label}>
              {s.label}
            </button>
          ))}
          <span className="sep" />
          {/* Power-user menu button */}
          <button
            title={powerUserOpen ? 'Close debug menu (Esc)' : 'Open legacy 01–12 screens'}
            onClick={() => setPowerUserOpen(\!powerUserOpen)}
          >
            ⋯
          </button>
          <span className="sep" />
          <button
            title="Reset persistent store (clears uploads, tasks, postcard versions)"
            onClick={() => {
              if (confirm('Reset demo store? This clears uploaded assets, media tasks, and postcard versions.')) {
                lcResetStore();
                location.reload();
              }
            }}
          >
            Reset
          </button>
        </div>

        {/* Power-user menu: legacy 01–12 screens */}
        <div className="app-power-user-menu">
          {SCREENS_LEGACY.map(s => (
            <button
              key={s.id}
              data-active={screen === s.id}
              onClick={() => pickLegacy(s.id)}
              title={s.label}
            >
              {s.label}
            </button>
          ))}
        </div>

        <div
          className="app-dock-handle"
          title={dockOpen ? 'Close (Esc)' : 'Open screen switcher'}
          onClick={() => { setDockOpen(o => \!o); setPowerUserOpen(false); }}
        >
          <span className="dot" />
          <span>{cur?.label || 'Screens'}</span>
          <span style={{ opacity: 0.5, marginLeft: 2 }}>{dockOpen ? '×' : '⌃'}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
