<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>London Cuts · Pitch · Demo Day 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="deck.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>
</head>
<body>

<deck-stage width="1920" height="1080">
  <div id="s1"></div>
  <div id="s2"></div>
  <div id="s3"></div>
  <div id="s4"></div>
  <div id="s5"></div>
  <div id="s6"></div>
</deck-stage>

<script type="text/babel" src="S01Cover.jsx"></script>
<script type="text/babel" src="S02Problem.jsx"></script>
<script type="text/babel" src="S03Solution.jsx"></script>
<script type="text/babel" src="S04Modes.jsx"></script>
<script type="text/babel" src="S05How.jsx"></script>
<script type="text/babel" src="S06Ask.jsx"></script>

<script type="text/babel">
  // Mount each slide into its host div (kept as a direct child of deck-stage)
  const mounts = [
    ['s1', window.S01Cover],
    ['s2', window.S02Problem],
    ['s3', window.S03Solution],
    ['s4', window.S04Modes],
    ['s5', window.S05How],
    ['s6', window.S06Ask],
  ];
  requestAnimationFrame(() => {
    mounts.forEach(([id, C]) => {
      const host = document.getElementById(id);
      if (host && C) ReactDOM.createRoot(host).render(<C />);
    });
  });
</script>

</body>
</html>
