<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="col" style="gap:10px">
<div class="row" style="gap:16px;align-items:center"><div style="width:60px;height:40px;border:1px solid var(--rule);background:var(--paper)"></div><span class="val">1px rule · hairline hard-corner (all chrome)</span></div>
<div class="row" style="gap:16px;align-items:center"><div style="width:40px;height:40px;border:2.5px solid oklch(0.55 0.14 20);border-radius:50%;background:transparent"></div><span class="val">50% · roundel / pip / atlas marker</span></div>
<div class="row" style="gap:16px;align-items:center"><div style="padding:4px 9px;border:1px solid var(--ink);border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em">CHIP</div><span class="val">999px · chips only</span></div>
<div class="row" style="gap:16px;align-items:center"><div style="padding:4px 8px;border-radius:2px;background:oklch(0.98 0.004 60 / 0.9);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em">PLACEHOLDER CAP</div><span class="val">2px · caption chip inside image-ph</span></div>
</div>
</div></body></html>
