<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:var(--paper)">
<div class="col" style="gap:14px">
<div class="row" style="gap:10px;flex-wrap:wrap">
<button style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer">Publish →</button>
<button style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer">Done →</button>
<button style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer">Flip ↻</button>
<button style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid transparent;background:transparent;color:var(--ink);cursor:pointer">← Projects</button>
</div>
<div class="eyebrow">Default · solid · small · ghost — mono label, hard corners, fill-invert on hover</div>
</div>
</div></body></html>
