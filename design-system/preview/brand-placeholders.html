<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>.img-ph{position:relative;height:110px;flex:1;overflow:hidden;display:flex;align-items:flex-end;background:repeating-linear-gradient(135deg,oklch(0.88 0.01 60) 0 10px,oklch(0.92 0.008 60) 10px 20px);color:oklch(0.35 0.01 60)}
.img-ph::before{content:attr(data-label);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:8px 10px;background:oklch(0.98 0.004 60 / 0.9);margin:8px;border-radius:2px}
.img-ph[data-tone="dark"]{background:repeating-linear-gradient(135deg,oklch(0.2 0.01 250) 0 10px,oklch(0.24 0.01 250) 10px 20px);color:oklch(0.7 0.01 60)}
.img-ph[data-tone="dark"]::before{background:oklch(0.15 0.01 250 / 0.9);color:oklch(0.85 0.01 60)}
.img-ph[data-tone="warm"]{background:repeating-linear-gradient(135deg,oklch(0.82 0.04 50) 0 10px,oklch(0.86 0.03 55) 10px 20px)}
.img-ph[data-tone="punk"]{background:repeating-linear-gradient(45deg,oklch(0.15 0 0) 0 8px,oklch(0.9 0 0) 8px 10px);color:#fff}
.img-ph[data-tone="punk"]::before{background:oklch(0.62 0.24 25);color:#fff}</style></head>
<body><div class="card">
<div class="row" style="gap:8px">
<div class="img-ph" data-label="DEFAULT"></div>
<div class="img-ph" data-tone="warm" data-label="WARM"></div>
<div class="img-ph" data-tone="dark" data-label="CINEMA"></div>
<div class="img-ph" data-tone="punk" data-label="PUNK"></div>
</div>
</div></body></html>
