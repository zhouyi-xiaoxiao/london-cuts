<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="row" style="gap:8px;flex-wrap:wrap">
<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--ink);border-radius:999px;opacity:.8">SE1</span>
<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--ink);border-radius:999px;opacity:.8">Walking</span>
<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:999px">CURRENT</span>
<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:999px">LIVE</span>
<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:999px;opacity:.75">DRAFT</span>
</div>
<div class="eyebrow" style="margin-top:12px">Chips are round-pilled (the only circular chrome); buttons stay hard-cornered</div>
</div></body></html>
